    onPick: (cellId) => { setArmed(null); resolveInvestigate(targetIdx, cellId); },
  });
}
function resolveInvestigate(targetIdx, cellId) {
  const me = currentPlayer();
  const target = G.players[targetIdx];
  const cell = G.cells.find(c => c.id === cellId);
  const lang = I18N.getLang();

  const targetHit = evalClue(target.clue, cell, G.cells);
  const meHit = evalClue(me.clue, cell, G.cells);
  const coord = "(" + cell.col + "," + cell.row + ")";
  const tname = G.mode === "hidden" ? I18N.t("playerLabel") + " " + (target.idx + 1) : FACTION[target.faction].icon + " " + I18N.t("playerLabel") + " " + (target.idx + 1);
  const mname = I18N.t("playerLabel") + " " + (me.idx + 1);

  // clear picking board first (markers not placed yet)
  G.lastMarkCell = null;
  renderBoard();
  pushTransient(I18N.t("sendingBird"), "var(--sepia)");
  SFX.wing();

  const to = hpos(cell.col, cell.row);
  const from = { x: -HS * 0.6, y: to.y };

  const land = () => {
    // place markers now, then reveal with drop
    if (!G.marks[cellId]) G.marks[cellId] = {};
    G.marks[cellId][target.idx] = targetHit ? "hit" : "miss";
    G.marks[cellId][me.idx] = meHit ? "hit" : "miss";
    G.lastMarkCell = cellId;

    const res = targetHit
      ? '<b style="color:#9a2a1e">\uD83E\uDE78 ' + I18N.t("hitLabel") + '</b>'
      : '<span style="color:#5a4c38">\u2716 ' + I18N.t("missLabel") + '</span>';
    pushLog(I18N.t("logInvestigate", { n: me.idx + 1, target: tname, coord }) + " " + res);

    flashCell(cell, targetHit);
    impactAt(cell, targetHit ? "#9a2a1e" : "#8a7a62");
    SFX.place();
    if (targetHit) announce("\uD83E\uDE78", I18N.t("hitLabel"), I18N.t("hitSub", { name: tname }) + " " + coord, "#e9c46a", 1300);
    else announce("\u2716", I18N.t("missLabel"), I18N.t("missSub", { name: tname }) + " " + coord, "#cdb98a", 1300);
    setTimeout(() => { nextTurn(); }, 1450);
  };

  if (USE_3D && board3d) board3d.flyBird(cell.id, land);
  else flyToken("🕊️", from, to, { size: 22, dur: 680, arc: -HS * 2.4, flap: true, ease: k => 1 - Math.pow(1 - k, 2) }, land);
  // fallback if reduced motion (flyToken calls cb immediately)
}

// STRIKE: choose a cell, check ALL players
function openStrike() {
  const me = currentPlayer();
  modal.style.borderTopColor = "var(--red)";
  modal.innerHTML =
    '<div class="modal-head">' + I18N.t("strikeModalTitle") + '</div>' +
    '<div class="modal-sub">' + I18N.t("strikeModalSub") + '</div>' +
    '<div class="pick-hint">\u26A0 ' + I18N.t("strikeModalHint").replace(/^\u26A0\s*/, "") + '</div>' +
    '<div class="modal-foot"><button class="btn" id="mCancel">' + I18N.t("pickCancel") + '</button><button class="btn btn-primary" id="mPick">' + I18N.t("pickStrike") + '</button></div>';
  overlay.classList.add("show");
  $("mCancel").onclick = closeOverlay;
  $("mPick").onclick = () => {
    closeOverlay();
    setArmed("strike");
    pushTransient(I18N.t("pickStrike"), "var(--red)");
    renderBoard({ selectable: true, pickLabel: I18N.t("strike") + ": " + I18N.t("pickStrike").replace(" \u2192", ""), onPick: (cellId) => { setArmed(null); resolveStrike(cellId); } });
  };
}
function resolveStrike(cellId) {
  const me = currentPlayer();
  const cell = G.cells.find(c => c.id === cellId);
  const coord = "(" + cell.col + "," + cell.row + ")";
  const lang = I18N.getLang();

  // check all players' clues
  const results = G.players.map(p => ({ p, hit: evalClue(p.clue, cell, G.cells) }));
  const allHit = results.every(r => r.hit);
  const isAnswer = (cell.col === G.answer.col && cell.row === G.answer.row);
  const win = allHit && isAnswer;

  // clear picking board, then plunge the dagger
  G.lastMarkCell = null;
  renderBoard();
  pushTransient(I18N.t("sendingHitman"), "var(--red)");
  const to = hpos(cell.col, cell.row);
  const from = { x: to.x, y: to.y };

  const land = () => {
    // place every player's marker publicly
    if (!G.marks[cellId]) G.marks[cellId] = {};
    results.forEach(r => { G.marks[cellId][r.p.idx] = r.hit ? "hit" : "miss"; });
    G.lastMarkCell = cellId;
    SFX.clash();
    $("boardArea").classList.add("shake");
    setTimeout(() => $("boardArea").classList.remove("shake"), 450);

    if (win) {
      pushLog(I18N.t("logStrikeWin", { n: me.idx + 1, coord }));
      G.over = true;
      setTimeout(() => splashWin(me), 600);
    } else {
      const miss = results.find(r => !r.hit);
      const who = miss ? (G.mode === "hidden" ? I18N.t("someone") : I18N.FACTION_I18N[lang][miss.p.faction].name) : I18N.t("compIntelLabel");
      pushLog(I18N.t("logStrikeFail", { n: me.idx + 1, coord, who }));
      flashCell(cell, false);
      impactAt(cell, "#5a4c38");
      SFX.fail();
      announce("\uD83D\uDDE1\uFE0F\uD83D\uDCA8", I18N.t("strikeFailLabel"), I18N.t("strikeFailSub", { name: who }), "#cdb98a", 1400);
      setTimeout(() => { nextTurn(); }, 1550);
    }
  };

  // dagger falls from above the board straight into the cell
  if (USE_3D && board3d) board3d.dropDagger(cell.id, land);
  else flyToken("🗡️", { x: to.x, y: to.y - HS * 4 }, to, { size: 30, dur: 420, arc: 0, ease: k => k * k, spin: 0 }, land);
}

function flashCell(cell, hit) {
  if (USE_3D && board3d) { board3d.setMarks(G.marks, G.lastMarkCell); board3d.impact(cell.id, hit ? 0x9a2a1e : 0x8a7a62); return; }
  // re-render board then overlay a quick pulse via a temporary svg circle
  renderBoard();
  const area = $("boardArea");
  const svg = area.querySelector("svg");
  if (!svg) return;
  const pos = hpos(cell.col, cell.row);
  const ns = "http://www.w3.org/2000/svg";
  const c = document.createElementNS(ns, "circle");
  c.setAttribute("cx", pos.x); c.setAttribute("cy", pos.y); c.setAttribute("r", HS * 0.7);
  c.setAttribute("fill", "none");
  c.setAttribute("stroke", hit ? "#9a2a1e" : "#8a7a62");
  c.setAttribute("stroke-width", "3");
  c.setAttribute("opacity", "0.9");
  svg.appendChild(c);
  let r = HS * 0.7, op = 0.9;
  const anim = setInterval(() => {
    r += 2.5; op -= 0.07;
    c.setAttribute("r", r); c.setAttribute("opacity", Math.max(0, op));
    if (op <= 0) { clearInterval(anim); c.remove(); }
  }, 24);
}

const SVGNS = "http://www.w3.org/2000/svg";
const reduceMotion = () => window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

// fly a glyph token along a quadratic arc inside the board SVG, then callback
function flyToken(glyph, from, to, opts, cb) {
  opts = opts || {};
  const svg = $("boardArea").querySelector("svg");
  if (!svg || reduceMotion()) { if (cb) cb(); return; }
  const t = document.createElementNS(SVGNS, "text");
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("dominant-baseline", "middle");
  t.setAttribute("font-size", opts.size || 22);
  t.setAttribute("pointer-events", "none");
  t.textContent = glyph;
  svg.appendChild(t);
  // control point for arc (perpendicular lift)
  const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
  const cx = mx, cy = my + (opts.arc != null ? opts.arc : -HS * 2.2);
  const dur = opts.dur || 620;
  const start = performance.now();
  function frame(now) {
    let k = Math.min(1, (now - start) / dur);
    const e = opts.ease ? opts.ease(k) : k;
    const x = (1 - e) * (1 - e) * from.x + 2 * (1 - e) * e * cx + e * e * to.x;
    const y = (1 - e) * (1 - e) * from.y + 2 * (1 - e) * e * cy + e * e * to.y;
    t.setAttribute("x", x.toFixed(1));
    t.setAttribute("y", y.toFixed(1));
    if (opts.spin) t.setAttribute("transform", "rotate(" + (e * opts.spin) + " " + x.toFixed(1) + " " + y.toFixed(1) + ")");
    if (opts.flap) t.setAttribute("transform", "translate(" + x.toFixed(1) + " " + y.toFixed(1) + ") scale(1," + (0.72 + 0.28 * Math.abs(Math.sin(k * Math.PI * 6))) + ") translate(" + (-x).toFixed(1) + " " + (-y).toFixed(1) + ")");
    if (k < 1) requestAnimationFrame(frame);
    else { t.remove(); if (cb) cb(); }
  }
  requestAnimationFrame(frame);
}

// small impact ring at a cell
function impactAt(cell, color) {
  if (USE_3D && board3d) { board3d.impact(cell.id, cssHexToNum(color)); return; }
  const svg = $("boardArea").querySelector("svg");
  if (!svg) return;
  const pos = hpos(cell.col, cell.row);
  const ring = document.createElementNS(SVGNS, "circle");
  ring.setAttribute("cx", pos.x); ring.setAttribute("cy", pos.y); ring.setAttribute("r", HS * 0.55);
  ring.setAttribute("fill", "none"); ring.setAttribute("stroke", color || "#9a2a1e"); ring.setAttribute("stroke-width", "3");
  ring.setAttribute("style", "transform-box:fill-box;transform-origin:" + pos.x + "px " + pos.y + "px;animation:impactRing 0.5s ease-out both");
  svg.appendChild(ring);
  setTimeout(() => ring.remove(), 520);
}

// ── TURN advance (snake) ─────────────────────────────────
function nextTurn() {
  if (G.over) return;
  const n = G.players.length;
  const prevRound = G.round;
  G.stepInRound++;
  if (G.stepInRound >= n) { G.stepInRound = 0; G.round++; }
  const reversed = (G.round !== prevRound && n > 1);
  const seq = (G.round % 2 === 0) ? G.snakeFwd : G.snakeBack;
  G.turnIdx = seq[G.stepInRound];
  G.lastMarkCell = null;   // markers already dropped; keep them static on turn change
  renderBoard();
  updateTurn();
  renderLog();
  if (reversed) {
    announce("🐍", I18N.t("reverseOrder"), I18N.t("reverseSub"), "#e9c46a", 1500);
    setTimeout(() => turnBanner(currentPlayer()), 700);
  } else {
    turnBanner(currentPlayer());
  }
}

// ── RESULT splash ────────────────────────────────────────
function splashWin(winner) {

  } else {
    const area = $("boardArea");

      const pos = hpos(G.answer.col, G.answer.row);

        const ring = document.createElementNS(ns, "circle");
        ring.setAttribute("cx", pos.x); ring.setAttribute("cy", pos.y);
        ring.setAttribute("r", HS * 0.6); ring.setAttribute("fill", "none");
        ring.setAttribute("stroke", "#9a2a1e"); ring.setAttribute("stroke-width", "3");
        svg.appendChild(ring);
        let r = HS * 0.6, op = 0.9;
        setTimeout(() => {
          const t = setInterval(() => { r += 3.5; op -= 0.05; ring.setAttribute("r", r); ring.setAttribute("opacity", Math.max(0, op)); if (op <= 0) { clearInterval(t); ring.remove(); } }, 26);
        }, i * 220);
      }
    }
  }
  announce("\uD83D\uDDE1\uFE0F\uD83D\uDC79", I18N.t("strikeWinLabel"), I18N.t("strikeWinSub"), "#e9c46a", 1400);
  SFX.win();

  setTimeout(() => {
    const lang = I18N.getLang();
    const fc = FACTION[winner.faction];
    const fcName = I18N.FACTION_I18N[lang][winner.faction].name;
    const card = $("resultCard");
    const epi = G.mode === "hidden" ? I18N.EPILOGUE_HIDDEN[lang] : I18N.EPILOGUE[lang][winner.faction];
    card.innerHTML =
      '<div class="result-glyph">\uD83D\uDDE1\uFE0F\uD83D\uDC79</div>' +
      '<div class="result-text" style="color:#e9c46a">' + I18N.t("winTitle") + '</div>' +
      '<div class="result-sub">' + I18N.t("winSub", { n: winner.idx + 1 }) + (G.mode === "hidden" ? "" : " \u00b7 " + fc.icon + " " + fcName) + '</div>' +
      '<div class="result-epilogue">' + epi + '</div>' +
      '<div style="margin-top:22px"><button class="btn btn-primary" onclick="location.reload()">' + I18N.t("startNewGame") + '</button></div>';
    $("resultSplash").classList.add("show");
    spawnEmbers();
  }, 1500);
}

// ember/ash confetti drifting down over the win splash
function spawnEmbers() {
  if (reduceMotion()) return;
  const host = $("resultSplash");
  const colors = ["#e9c46a", "#c9862a", "#9a2a1e", "#e2d8bf"];
  for (let i = 0; i < 34; i++) {
    const e = document.createElement("span");
    e.className = "ember";
    e.style.left = Math.random() * 100 + "%";
    e.style.background = colors[Math.floor(Math.random() * colors.length)];
    e.style.width = e.style.height = (3 + Math.random() * 5).toFixed(1) + "px";
    e.style.animationDuration = (2.4 + Math.random() * 2.6).toFixed(2) + "s";
    e.style.animationDelay = (Math.random() * 1.2).toFixed(2) + "s";
    e.style.setProperty("--drift", (Math.random() * 60 - 30).toFixed(0) + "px");
    host.appendChild(e);
    setTimeout(() => e.remove(), 6000);
  }
}

})();
</script>
</body>
</html>
