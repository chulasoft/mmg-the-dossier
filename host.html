<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Dossier · Host</title>
<script src="./i18n.js"></script>
<style>
:root{
  --paper:#e9e1cd; --paper2:#e2d8bf; --ink:#241c12; --ink2:#5a4c38; --ink3:#8a7a62;
  --rule:#c4b596; --red:#9a2a1e; --sepia:#8a6a3a;
  --p0:#9a2a1e; --p1:#8a6a28; --p2:#3a5a72; --p3:#6a4a7a; --p4:#3a6a3a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:Georgia,'Times New Roman',serif;color:var(--ink);overflow:hidden;}
body{
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(120,90,50,0.012) 3px, rgba(120,90,50,0.012) 4px),
    radial-gradient(ellipse 90% 60% at 50% 0%, #efe8d6, #e4dabf);
  height:100dvh;
}
.screen{display:none;height:100dvh;}
.screen.active{display:flex;animation:screenIn 0.55s cubic-bezier(0.2,0.7,0.3,1) both;}
.btn{font-family:Georgia,serif;font-size:0.8rem;padding:8px 16px;border:1px solid var(--ink2);background:var(--paper);color:var(--ink);cursor:pointer;border-radius:1px;transition:all 0.15s;box-shadow:1px 1px 0 rgba(36,28,18,0.18);}
.btn:hover{background:var(--ink);color:var(--paper);transform:translate(-1px,-1px);box-shadow:2px 2px 0 rgba(36,28,18,0.25);}
.btn-primary{background:var(--ink);color:var(--paper);font-weight:700;}
.btn-primary:hover{background:var(--red);}

/* ── SELECT players ── */
#sel{flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.sel-kicker{font-size:0.7rem;letter-spacing:0.4em;color:var(--red);text-transform:uppercase;margin-bottom:10px;font-weight:700;}
.sel-title{font-size:clamp(2.4rem,7vw,3.6rem);font-weight:900;margin-bottom:8px;text-shadow:0 2px 0 rgba(255,255,255,0.4);}
.sel-rule{display:flex;align-items:center;gap:14px;margin:12px 0 30px;width:min(440px,80vw);}
.sel-rule:before,.sel-rule:after{content:"";flex:1;border-top:2px solid var(--ink);border-bottom:1px solid var(--ink);}
.sel-rule span{font-size:0.64rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink2);}
.sel-q{font-size:1rem;color:var(--ink2);margin-bottom:20px;font-style:italic;}
.sel-nums{display:flex;gap:18px;}
.sel-num{width:130px;height:160px;border:1px solid var(--ink);border-top:4px solid var(--red);background:var(--paper2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:3px 3px 0 rgba(36,28,18,0.16);transition:all 0.2s;}
.sel-num:hover{transform:translateY(-4px);box-shadow:5px 7px 0 rgba(36,28,18,0.22);}
.sel-num b{font-size:3rem;font-weight:900;line-height:1;}
.sel-num span{font-size:0.74rem;color:var(--ink2);letter-spacing:0.06em;}
.sel-mode{margin-top:26px;display:flex;gap:8px;align-items:center;}
.sel-mode .lbl{font-size:0.7rem;color:var(--ink3);font-style:italic;}
.mode-btn{font-family:Georgia,serif;font-size:0.72rem;padding:5px 14px;border:1px solid var(--ink2);background:var(--paper);color:var(--ink2);cursor:pointer;border-radius:1px;}
.mode-btn.on{background:var(--red);color:var(--paper);border-color:var(--red);font-weight:700;}
.load-note{margin-top:18px;font-size:0.66rem;color:var(--ink3);font-style:italic;}

/* ── BRIEFING ── */
#brief{flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.brief-card{max-width:680px;width:100%;background:var(--paper2);border:1px solid var(--ink);border-top:4px solid var(--red);padding:32px 38px;box-shadow:4px 4px 0 rgba(36,28,18,0.18);animation:fadeUp 0.6s ease both;}
.brief-kicker{font-size:0.66rem;letter-spacing:0.3em;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.brief-title{font-size:1.7rem;font-weight:800;margin-bottom:6px;}
.brief-sub{font-size:0.72rem;color:var(--ink3);font-style:italic;margin-bottom:18px;}
.brief-story{font-size:0.96rem;line-height:1.9;color:var(--ink);min-height:8em;text-align:left;}
.brief-caret{color:var(--red);animation:blink 0.9s step-end infinite;}
.brief-factions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:22px 0 8px;}
.bf-card{border:1px solid var(--rule);border-left:4px solid;background:var(--paper);padding:8px 12px;text-align:left;min-width:130px;opacity:0;animation:cardDeal 0.55s cubic-bezier(0.2,0.9,0.3,1.2) forwards;box-shadow:2px 2px 0 rgba(36,28,18,0.14);}
.bf-p{font-size:0.6rem;color:var(--ink3);letter-spacing:0.1em;}
.bf-name{font-size:0.82rem;font-weight:800;}
.bf-intel{font-size:0.6rem;color:var(--ink2);font-style:italic;}
.brief-go{margin-top:24px;}

/* ── QR distribute ── */
#qr{flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.qr-kicker{font-size:0.66rem;letter-spacing:0.3em;color:var(--red);text-transform:uppercase;font-weight:700;margin-bottom:6px;}
.qr-title{font-size:1.5rem;font-weight:800;margin-bottom:4px;}
.qr-sub{font-size:0.74rem;color:var(--ink2);font-style:italic;margin-bottom:20px;}
.qr-box{background:#fff;border:1px solid var(--ink);padding:16px;box-shadow:3px 3px 0 rgba(36,28,18,0.18);}
.qr-box svg, .qr-box img{display:block;width:240px;height:240px;}
.qr-player{margin-top:16px;font-size:1.1rem;font-weight:800;}
.qr-faction{font-size:0.8rem;color:var(--ink2);margin-top:2px;}
.qr-dots{display:flex;gap:8px;margin-top:18px;}
.qr-dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--ink2);background:var(--paper);}
.qr-dot.done{background:var(--ink);}
.qr-dot.cur{background:var(--red);border-color:var(--red);box-shadow:0 0 0 3px rgba(154,42,30,0.18);}
.qr-nav{display:flex;gap:10px;margin-top:22px;}

/* ── GAME BOARD ── */
#game{flex-direction:column;height:100dvh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:2px solid var(--ink);background:var(--paper2);}
.tb-left{display:flex;align-items:baseline;gap:14px;}
.tb-title{font-size:1.2rem;font-weight:900;letter-spacing:-0.01em;}
.tb-snake{font-size:0.6rem;color:var(--ink3);letter-spacing:0.1em;}
.tb-turn{display:flex;align-items:center;gap:10px;}
.tb-turn-label{font-size:0.62rem;color:var(--ink3);letter-spacing:0.14em;text-transform:uppercase;}
.tb-cur{display:flex;align-items:center;gap:8px;padding:5px 14px;border:2px solid;border-radius:2px;font-weight:800;font-size:1rem;animation:turnPulse 2s ease-in-out infinite;}
.tb-players{display:flex;gap:6px;}
.tb-pl{display:flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid var(--rule);border-radius:2px;font-size:0.72rem;background:var(--paper);}
.tb-pl.active{border-width:2px;font-weight:800;}
.tb-pl .dot{width:9px;height:9px;border-radius:50%;}

.play-row{flex:1;display:flex;align-items:stretch;gap:0;min-height:0;}
.board-area{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;min-height:0;position:relative;overflow:hidden;}
.board-area svg{max-width:100%;max-height:100%;}

/* side action buttons flanking the map */
.side-action{width:clamp(120px,14vw,180px);flex-shrink:0;border:none;border-top:2px solid var(--ink);background:var(--paper2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:all 0.18s;font-family:Georgia,serif;position:relative;overflow:hidden;}
.side-action.investigate{border-right:2px solid var(--ink);box-shadow:inset 6px 0 0 var(--sepia);}
.side-action.strike{border-left:2px solid var(--ink);box-shadow:inset -6px 0 0 var(--red);}
.side-action:hover{background:var(--paper);}
.side-action.investigate:hover{box-shadow:inset 10px 0 0 var(--sepia);}
.side-action.strike:hover{box-shadow:inset -10px 0 0 var(--red);}
.side-action:active{transform:scale(0.97);}
.side-action:disabled{opacity:0.35;cursor:not-allowed;}
.side-action.armed{background:var(--paper);}
.side-action.investigate.armed{box-shadow:inset 0 0 0 3px var(--sepia), inset 10px 0 0 var(--sepia);}
.side-action.strike.armed{box-shadow:inset 0 0 0 3px var(--red), inset -10px 0 0 var(--red);}
.sa-icon{font-size:clamp(2.2rem,4vw,3.2rem);line-height:1;transition:transform 0.2s cubic-bezier(0.2,0.9,0.3,1.3);}
.side-action.investigate:hover .sa-icon{transform:rotate(-12deg) scale(1.12);}
.side-action.strike:hover .sa-icon{transform:translateY(-6px) scale(1.12);}
.sa-label{font-size:clamp(0.9rem,1.4vw,1.15rem);font-weight:900;letter-spacing:0.02em;}
.side-action.investigate .sa-label{color:var(--sepia);}
.side-action.strike .sa-label{color:var(--red);}
.sa-sub{font-size:clamp(0.56rem,0.9vw,0.7rem);color:var(--ink3);padding:0 10px;text-align:center;line-height:1.3;}

.bottombar{display:flex;align-items:stretch;gap:14px;padding:9px 18px;border-top:2px solid var(--ink);background:var(--paper2);min-height:0;}
.log-panel{flex:1;display:flex;flex-direction:column;justify-content:center;gap:5px;min-width:0;}
.log-head{font-size:0.54rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink3);font-weight:700;}
.log-entry{font-size:0.8rem;line-height:1.35;padding:5px 11px;background:var(--paper);border:1px solid var(--rule);border-left:3px solid var(--ink2);border-radius:1px;animation:slideIn 0.3s ease both;}
.log-entry.empty{color:var(--ink3);font-style:italic;border-left-color:var(--rule);}
.log-entry.fresh{animation:logFlash 2s ease both;}
@keyframes logFlash{0%{background:#f4ecd6;box-shadow:0 0 0 2px rgba(233,196,106,0.5);}30%{background:#f4ecd6;}100%{background:var(--paper);box-shadow:0 0 0 0 rgba(233,196,106,0);}}
.menu-btn{align-self:center;flex-shrink:0;}

/* marker tooltip */
.mk-tip{position:fixed;z-index:90;pointer-events:none;background:var(--ink);color:var(--paper);font-family:Georgia,serif;font-size:0.74rem;line-height:1.4;padding:7px 11px;border-radius:3px;box-shadow:0 4px 14px rgba(36,28,18,0.34);max-width:240px;opacity:0;transform:translateY(4px);transition:opacity 0.14s,transform 0.14s;display:none;}
.mk-tip.show{opacity:1;transform:translateY(0);}
.mk-tip b{color:#e9c46a;}

/* center announce toast */
.announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);z-index:75;pointer-events:none;
  display:none;flex-direction:column;align-items:center;gap:6px;text-align:center;
  padding:18px 38px;background:rgba(26,18,10,0.94);border:1px solid rgba(233,196,106,0.35);border-radius:6px;
  box-shadow:0 10px 40px rgba(36,28,18,0.42);min-width:240px;}
.announce.show{display:flex;animation:announceIn 0.5s cubic-bezier(0.2,1.2,0.4,1) both;}
.announce.out{animation:announceOut 0.35s ease both;}
.announce .a-glyph{font-size:2.6rem;line-height:1;}
.announce .a-main{font-size:1.5rem;font-weight:900;font-family:'Playfair Display',Georgia,serif;color:var(--paper);}
.announce .a-sub{font-size:0.78rem;color:#cdb98a;font-style:italic;}
@keyframes announceIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.7);}60%{opacity:1;}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes announceOut{from{opacity:1;}to{opacity:0;transform:translate(-50%,-58%) scale(0.96);}}

/* turn banner: slides from top */
.turn-banner{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-100%);z-index:70;
  background:var(--ink);color:var(--paper);font-family:Georgia,serif;font-weight:800;font-size:1rem;
  padding:9px 26px;border-radius:0 0 8px 8px;box-shadow:0 4px 16px rgba(36,28,18,0.34);white-space:nowrap;
  display:flex;align-items:center;gap:10px;}
.turn-banner.show{animation:turnBanner 1.8s ease both;}
@keyframes turnBanner{0%{transform:translateX(-50%) translateY(-100%);}14%,80%{transform:translateX(-50%) translateY(0);}100%{transform:translateX(-50%) translateY(-100%);}}
.turn-banner .tb-dot{width:12px;height:12px;border-radius:50%;}

/* selection mode: pulsing frame on board */
.board-area.picking{box-shadow:inset 0 0 0 3px rgba(233,196,106,0.0);animation:pickPulse 1.4s ease-in-out infinite;}

/* sound toggle */
.sfx-toggle{position:fixed;bottom:14px;right:14px;z-index:95;width:40px;height:40px;border-radius:50%;
  border:1px solid var(--ink2);background:var(--paper);color:var(--ink);font-size:1.1rem;cursor:pointer;
  box-shadow:2px 2px 0 rgba(36,28,18,0.18);transition:all 0.16s;display:flex;align-items:center;justify-content:center;}
.sfx-toggle:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(36,28,18,0.24);}
.sfx-toggle.on{background:var(--ink);color:#e9c46a;border-color:var(--ink);}
.lang-toggle{position:fixed;bottom:14px;right:60px;z-index:95;min-width:40px;height:40px;padding:0 10px;border-radius:20px;
  border:1px solid var(--ink2);background:var(--paper);color:var(--ink);font-size:0.74rem;font-weight:800;letter-spacing:0.03em;
  cursor:pointer;box-shadow:2px 2px 0 rgba(36,28,18,0.18);transition:all 0.16s;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;}
.lang-toggle:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(36,28,18,0.24);}

/* wax-seal phase transition */
.wax-seal{position:fixed;inset:0;z-index:85;display:none;align-items:center;justify-content:center;pointer-events:none;
  background:radial-gradient(circle at 50% 50%, rgba(26,18,10,0.5), rgba(26,18,10,0.82));}
.wax-seal.show{display:flex;animation:waxFade 0.9s ease both;}
.wax-disc{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 38% 34%, #b83a2a, #7a1e14 70%);
  border:3px solid #5a1610;display:flex;align-items:center;justify-content:center;font-size:3rem;
  box-shadow:0 8px 30px rgba(36,28,18,0.5), inset 0 -6px 14px rgba(0,0,0,0.35), inset 0 6px 12px rgba(255,180,160,0.25);
  color:#e9c9a0;animation:waxStamp 0.9s cubic-bezier(0.3,1.4,0.5,1) both;}
@keyframes waxStamp{0%{transform:scale(2.2) rotate(-12deg);opacity:0;}30%{opacity:1;}45%{transform:scale(0.92) rotate(-4deg);}60%{transform:scale(1.04) rotate(-6deg);}100%{transform:scale(1) rotate(-6deg);opacity:1;}}
@keyframes waxFade{0%{opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}

@keyframes pickPulse{0%,100%{box-shadow:inset 0 0 0 3px rgba(180,140,60,0.15);}50%{box-shadow:inset 0 0 0 4px rgba(200,150,70,0.5);}}
.pick-ribbon{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:6;
  background:var(--ink);color:var(--paper);font-size:0.78rem;font-weight:700;padding:6px 16px;border-radius:20px;
  box-shadow:0 3px 10px rgba(36,28,18,0.3);display:none;align-items:center;gap:8px;}
.pick-ribbon.show{display:flex;animation:ribbonIn 0.3s ease both;}
@keyframes ribbonIn{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.pick-ribbon .pr-cancel{margin-left:4px;border:1px solid rgba(233,225,205,0.4);background:none;color:var(--paper);font-family:Georgia,serif;font-size:0.66rem;padding:2px 9px;border-radius:12px;cursor:pointer;pointer-events:auto;}
.pick-ribbon .pr-cancel:hover{background:rgba(233,225,205,0.15);}


/* ── OVERLAY (action picker / result) ── */
.overlay{position:fixed;inset:0;background:rgba(20,14,8,0.6);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px;z-index:60;}
.overlay.show{display:flex;animation:fadeIn 0.2s ease both;}
.modal{background:var(--paper);border:1px solid var(--ink);border-top:4px solid var(--red);max-width:520px;width:100%;padding:24px 26px;box-shadow:4px 6px 0 rgba(36,28,18,0.25);animation:popIn 0.25s cubic-bezier(0.3,1.3,0.5,1) both;}
.modal-head{font-size:1.2rem;font-weight:800;margin-bottom:4px;}
.modal-sub{font-size:0.74rem;color:var(--ink2);font-style:italic;margin-bottom:18px;}
.pick-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.pick-btn{font-family:Georgia,serif;font-size:0.8rem;padding:9px 16px;border:1px solid var(--ink2);background:var(--paper2);cursor:pointer;border-radius:1px;display:flex;align-items:center;gap:7px;transition:all 0.14s;}
.pick-btn:hover{border-color:var(--ink);transform:translateY(-1px);}
.pick-hint{font-size:0.68rem;color:var(--ink3);font-style:italic;margin:6px 0 14px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}

/* result splash */
.result-splash{position:fixed;inset:0;background:rgba(20,14,8,0.82);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:80;}
.result-splash.show{display:flex;animation:fadeIn 0.25s ease both;}
.result-card{text-align:center;animation:popIn 0.4s cubic-bezier(0.3,1.3,0.5,1) both;}
.result-glyph{font-size:5rem;margin-bottom:12px;animation:demonThrob 2.4s ease-in-out infinite;}
.result-epilogue{font-size:0.92rem;color:#cdb98a;font-style:italic;margin-top:14px;max-width:420px;line-height:1.6;animation:fadeIn 0.8s 0.4s ease both;}
.ember{position:absolute;top:-12px;border-radius:50%;pointer-events:none;opacity:0.9;animation:emberFall linear both;}
@keyframes emberFall{0%{transform:translateY(-12px) translateX(0) rotate(0);opacity:0;}12%{opacity:0.95;}100%{transform:translateY(105vh) translateX(var(--drift)) rotate(220deg);opacity:0;}}
@keyframes demonThrob{0%,100%{transform:scale(1) rotate(-2deg);filter:drop-shadow(0 0 0 rgba(154,42,30,0));}50%{transform:scale(1.08) rotate(2deg);filter:drop-shadow(0 0 18px rgba(154,42,30,0.6));}}
.result-text{font-size:2rem;font-weight:900;color:var(--paper);font-family:Georgia,serif;text-shadow:0 2px 12px rgba(20,14,8,0.55);}
.result-sub{font-size:1rem;color:var(--paper2);margin-top:8px;font-style:italic;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
@keyframes blink{50%{opacity:0;}}
@keyframes turnPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0);}50%{box-shadow:0 0 14px rgba(154,42,30,0.25);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
.shake{animation:shake 0.4s ease;}
/* ── board-game physical animations ── */
@keyframes tileDrop{0%{opacity:0;transform:translateY(-14px) scale(0.7);}70%{transform:translateY(2px) scale(1.04);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes markerDrop{0%{opacity:0;transform:scale(2.6) translateY(-16px);}55%{opacity:1;transform:scale(0.82) translateY(2px);}75%{transform:scale(1.12) translateY(0);}100%{transform:scale(1) translateY(0);}}
@keyframes landShadow{0%{opacity:0;transform:scale(0.2);}55%{opacity:0.35;transform:scale(1.15);}100%{opacity:0;transform:scale(1.4);}}
100%{transform:scale(1);}}
@keyframes cardDeal{0%{opacity:0;transform:translateX(-60px) translateY(20px) rotate(-14deg);}70%{transform:translateX(4px) translateY(-2px) rotate(2deg);}100%{opacity:1;transform:translateX(0) translateY(0) rotate(0);}}
100%{transform:translateY(0) scale(1) rotate(0);}}
}
@keyframes impactRing{0%{opacity:0.85;transform:scale(0.3);}100%{opacity:0;transform:scale(2.2);}}

@keyframes riseUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes dropDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
100%{opacity:1;transform:scale(1);}}
@keyframes fogDrift{0%{transform:translateX(-6%);opacity:0.5;}50%{opacity:0.85;}100%{transform:translateX(6%);opacity:0.5;}}
@keyframes gaslight{0%,100%{opacity:1;}45%{opacity:0.82;}48%{opacity:0.95;}52%{opacity:0.78;}}
}

/* SELECT entrances */
.sel-title{animation:gaslight 5s ease-in-out infinite;}
.sel-num{animation:riseUp 0.5s ease both;}
.sel-num:nth-child(1){animation-delay:0.1s;}
.sel-num:nth-child(2){animation-delay:0.2s;}
.sel-num:nth-child(3){animation-delay:0.3s;}
.sel-mode{animation:riseUp 0.5s 0.4s ease both;}

/* GAME chrome */
#game.active .topbar{animation:dropDown 0.5s 0.1s ease both;}
#game.active .board-area{animation:scaleIn 0.6s 0.15s cubic-bezier(0.2,0.8,0.3,1) both;}
#game.active .bottombar{animation:riseUp 0.5s 0.2s ease both;}
#game.active .side-action.investigate{animation:slideFadeL 0.5s 0.24s ease both;}
#game.active .side-action.strike{animation:slideFadeR 0.5s 0.3s ease both;}
@keyframes slideFadeL{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes slideFadeR{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* fog ambiance layer over board */
.board-area::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 30% 20%, rgba(205,210,214,0.12), transparent 70%),
             radial-gradient(ellipse 50% 35% at 75% 80%, rgba(205,210,214,0.10), transparent 70%);
  animation:fogDrift 14s ease-in-out infinite alternate;z-index:1;}
.board-area svg{position:relative;z-index:2;}
.board-area canvas{position:relative;z-index:2;display:block;width:100%;height:100%;touch-action:none;}

/* QR pieces */
#qr.active .qr-box{animation:scaleIn 0.5s 0.1s cubic-bezier(0.2,1.2,0.4,1) both;}
#qr.active .qr-player{animation:riseUp 0.5s 0.2s ease both;}
.qr-dot{transition:all 0.25s ease;}

/* briefing faction cards already fade; add card pop */
.brief-card{will-change:transform;}
.tb-pl{transition:all 0.25s ease;}
.tb-cur{transition:all 0.3s ease;}

/* generic button press feedback */
.btn:active,.action-btn:active,.sel-num:active,.mode-btn:active{transform:scale(0.97);}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms !important;animation-iteration-count:1 !important;}}
</style>
</head>
<body>


<!-- SELECT -->
<div id="sel" class="screen active">
  <div class="sel-kicker" data-i18n="selKicker"></div>
  <div class="sel-title">The Dossier</div>
  <div class="sel-rule"><span data-i18n="selRule"></span></div>
  <div class="sel-q" data-i18n="selQ"></div>
  <div class="sel-nums" id="selNums"></div>
  <div class="sel-mode">
    <span class="lbl" data-i18n="modeLabel"></span>
    <button class="mode-btn on" data-mode="open" data-i18n="modeOpen"></button>
    <button class="mode-btn" data-mode="hidden" data-i18n="modeHidden"></button>
  </div>
  <div class="load-note" id="loadNote" data-i18n="loading"></div>
</div>

<!-- BRIEFING -->
<div id="brief" class="screen">
  <div class="brief-card">
    <div class="brief-kicker" data-i18n="briefKicker"></div>
    <div class="brief-title" id="briefTitle"></div>
    <div class="brief-sub" id="briefSub"></div>
    <div class="brief-story" id="briefStory"></div>
    <div class="brief-factions" id="briefFactions"></div>
    <div class="brief-go"><button class="btn btn-primary" id="briefGo" data-i18n="briefGoBtn"></button></div>
  </div>
</div>

<!-- QR -->
<div id="qr" class="screen">
  <div class="qr-kicker" data-i18n="qrKicker"></div>
  <div class="qr-title" id="qrTitle"></div>
  <div class="qr-sub" data-i18n="qrSub"></div>
  <div class="qr-box" id="qrBox"></div>
  <div class="qr-player" id="qrPlayer"></div>
  <div class="qr-faction" id="qrFaction"></div>
  <div id="qrLink" style="margin-top:10px;font-size:0.6rem;color:var(--ink3);max-width:300px;word-break:break-all;"></div>
  <div class="qr-dots" id="qrDots"></div>
  <div class="qr-nav">
    <button class="btn" id="qrPrev" data-i18n="qrPrev"></button>
    <button class="btn btn-primary" id="qrNext" data-i18n="qrNext"></button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="topbar">
    <div class="tb-left">
      <span class="tb-title">The Dossier</span>
      <span class="tb-snake" id="tbSnake"></span>
    </div>
    <div class="tb-turn">
      <span class="tb-turn-label" data-i18n="turnOf2"></span>
      <span class="tb-cur" id="tbCur"></span>
    </div>
    <div class="tb-players" id="tbPlayers"></div>
  </div>
  <div class="play-row">
    <button class="side-action investigate" id="btnInvestigate">
      <span class="sa-icon">🕵️</span>
      <span class="sa-label" data-i18n="investigate"></span>
      <span class="sa-sub" data-i18n="investigateSub"></span>
    </button>
    <div class="board-area" id="boardArea"></div>
    <button class="side-action strike" id="btnStrike">
      <span class="sa-icon">🗡️</span>
      <span class="sa-label" data-i18n="strike"></span>
      <span class="sa-sub" data-i18n="strikeSub"></span>
    </button>
  </div>
  <div class="bottombar">
    <div class="log-panel">
      <div class="log-head" data-i18n="recentLog"></div>
      <div id="logList"></div>
    </div>
    <button class="btn menu-btn" id="btnMenu" data-i18n="newGame"></button>
  </div>
</div>

<!-- marker tooltip (hover / tap-hold) -->
<div id="mkTip" class="mk-tip"></div>

<!-- center announce toast (turn change / action result) -->
<div id="announce" class="announce"></div>

<!-- turn change banner (top) -->
<div id="turnBanner" class="turn-banner"></div>

<!-- sound toggle -->
<button id="sfxToggle" class="sfx-toggle" title="เสียง">🔇</button>

<!-- language toggle -->
<button id="langToggle" class="lang-toggle" title="Language">EN</button>

<!-- wax-seal phase transition -->
<div id="waxSeal" class="wax-seal"><div class="wax-disc">🕯</div></div>

<!-- ACTION OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- RESULT SPLASH -->
<div class="result-splash" id="resultSplash">
  <div class="result-card" id="resultCard"></div>
</div>

<script>//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript
//
// Copyright (c) 2009 Kazuhiko Arase
//
// URL: http://www.d-project.com/
//

//  http://www.opensource.org/licenses/mit-license.php

// DENSO WAVE INCORPORATED

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

  if (_texCache[hexColor]) return _texCache[hexColor];
  const S = 64, c = document.createElement("canvas"); c.width = c.height = S;
  const g = c.getContext("2d");
  const r = (hexColor>>16)&255, gg = (hexColor>>8)&255, b = hexColor&255;
  g.fillStyle = "rgb("+r+","+gg+","+b+")"; g.fillRect(0,0,S,S);
  // faint speckle grain (~5% contrast)
  for (let i=0;i<340;i++){ const x=Math.random()*S, y=Math.random()*S, d=(Math.random()<0.5?-1:1)*(6+Math.random()*8); g.fillStyle="rgba("+(r+d)+","+(gg+d)+","+(b+d)+",0.16)"; g.fillRect(x,y,1.3,1.3); }
  // very faint diagonal hatch for texture direction
  g.strokeStyle = "rgba(0,0,0,0.035)"; g.lineWidth=1;
  for (let x=-S; x<S; x+=7){ g.beginPath(); g.moveTo(x,0); g.lineTo(x+S,S); g.stroke(); }
  const tex = new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.anisotropy=4;
  _texCache[hexColor]=tex; return tex;
}

function makeRailStub(angle, length, surfY) {
  const g = new THREE.Group();
  const railMat = new THREE.MeshStandardMaterial({ color:0x33251a, roughness:0.55, metalness:0.4 });
  const tieMat  = new THREE.MeshStandardMaterial({ color:0x4a3826, roughness:0.85 });
  const gauge = 0.11;   // half-distance between the two rails
  // two parallel rails from center (x=0) outward to x=length
  for (const off of [-gauge, gauge]) {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(length, 0.05, 0.05), railMat);
    rail.position.set(length/2, surfY+0.04, off);
    rail.castShadow = true; g.add(rail);
  }
  // ties across, spaced along the stub
  const ties = Math.max(2, Math.round(length / 0.16));
  for (let i = 0; i < ties; i++) {
    const x = (i + 0.5) * (length / ties);
    const tie = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.035, gauge*2 + 0.09), tieMat);
    tie.position.set(x, surfY+0.02, 0); g.add(tie);
  }
  g.rotation.y = -angle;  // three z-forward: rotate so +x aligns to (dx,dz) direction
  return g;
}
function makeBuilding(kind) {
  const g = new THREE.Group();
  const H = FEATURE[kind].h;
  if (kind==="clock_tower") {
    // tallest, FAT, gold: chunky tower + big bright clock face + spire
    const mat=new THREE.MeshStandardMaterial({color:0xc9962a,roughness:0.55,metalness:0.35});
    const body=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.46,H*0.82,8),mat); body.position.y=H*0.41; g.add(body);
    const spire=new THREE.Mesh(new THREE.ConeGeometry(0.44,H*0.32,8),mat); spire.position.y=H*0.82+H*0.16; g.add(spire);
    const faceMat=new THREE.MeshStandardMaterial({color:0xfff6e2,emissive:0x6a5220,emissiveIntensity:0.5,roughness:0.35});
    const ringMat=new THREE.MeshStandardMaterial({color:0x2a1f10,roughness:0.5,metalness:0.4});
    for (const rot of [0, Math.PI]) {
      const z = rot===0?0.42:-0.42;
      const face=new THREE.Mesh(new THREE.CircleGeometry(0.23,20),faceMat); face.position.set(0, H*0.62, z); face.rotation.y=rot; g.add(face);
      const ring=new THREE.Mesh(new THREE.TorusGeometry(0.23,0.03,8,20),ringMat); ring.position.set(0, H*0.62, z); ring.rotation.y=rot; g.add(ring);
    }
  } else if (kind==="power_plant") {
    // medium, brown: wide low block + two chimneys (one taller)
    const mat=new THREE.MeshStandardMaterial({color:0x6b4a2e,roughness:0.82,metalness:0.08});
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.95,H*0.5,0.8),mat); body.position.y=H*0.25; g.add(body);
    const roof=new THREE.Mesh(new THREE.BoxGeometry(1.0,H*0.08,0.85),mat); roof.position.y=H*0.5; g.add(roof);
    const chMat=new THREE.MeshStandardMaterial({color:0x5a3d24,roughness:0.85});
    const c1=new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.15,H*0.55,10),chMat); c1.position.set(-0.22,H*0.5+H*0.275,0); g.add(c1);
    const c2=new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.13,H*0.4,10),chMat); c2.position.set(0.2,H*0.5+H*0.2,0.05); g.add(c2);
  } else { // station: shortest, gray, long low platform + pitched roof
    const mat=new THREE.MeshStandardMaterial({color:0x8a8f96,roughness:0.7,metalness:0.2});
    const base=new THREE.Mesh(new THREE.BoxGeometry(1.05,H*0.55,0.62),mat); base.position.y=H*0.275; g.add(base);
    const roofMat=new THREE.MeshStandardMaterial({color:0x6a6f76,roughness:0.6,metalness:0.25});
    const roof=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,1.12,3),roofMat); roof.rotation.z=Math.PI/2; roof.scale.set(1,1,0.5); roof.position.y=H*0.62; g.add(roof);
  }
  g.traverse(o=>{ if(o.isMesh) o.castShadow=true; });
  addEdges(g, 0x2a1f14, 0.5);
  return g;
}

function createBoard3D(container, opts) {
  opts = opts || {};
  let renderer;
  try { renderer = new THREE.WebGLRenderer({ antialias: opts.lite?false:true, alpha:true }); }
  catch(e){ return null; }
  const W = container.clientWidth||800, H = container.clientHeight||500;
  renderer.setSize(W,H); renderer.setPixelRatio(Math.min(devicePixelRatio, opts.lite?1.5:2));
  if (!opts.lite){ renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; }
  container.innerHTML=""; container.appendChild(renderer.domElement);
  renderer.domElement.style.display="block"; renderer.domElement.style.width="100%"; renderer.domElement.style.height="100%";

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xe4dabf, 26, 78);
  const cam = new THREE.PerspectiveCamera(42, W/H, 0.1, 500);

  const key = new THREE.DirectionalLight(0xffe8c4, 1.15); key.position.set(12,24,9);
  if (!opts.lite){ key.castShadow=true; key.shadow.mapSize.set(2048,2048); const d=24; Object.assign(key.shadow.camera,{left:-d,right:d,top:d,bottom:-d}); }
  scene.add(key);
  scene.add(new THREE.AmbientLight(0xbfd0dd, 0.6));
  const rim = new THREE.DirectionalLight(0x9a2a1e, 0.22); rim.position.set(-12,7,-13); scene.add(rim);

  const board = new THREE.Group(); scene.add(board);

  // camera rig (custom, no OrbitControls)
  let polar = 52*Math.PI/180, azim = 0, dist = 30, tPolar=polar, tAzim=azim, tDist=dist;
  const minPolar=(opts.lockPolar?46:25)*Math.PI/180, maxPolar=(opts.lockPolar?58:70)*Math.PI/180;
  function applyCam(){
    cam.position.set(Math.sin(tPolar)*Math.sin(tAzim)*tDist, Math.cos(tPolar)*tDist, Math.sin(tPolar)*Math.cos(tAzim)*tDist);
    cam.lookAt(0,0,0);

  applyCam();

  let dragging=false, lx=0, ly=0;
  const el = renderer.domElement;
  el.addEventListener("pointerdown", e=>{ dragging=true; lx=e.clientX; ly=e.clientY; el.setPointerCapture(e.pointerId); });
  el.addEventListener("pointerup", ()=> dragging=false);
  el.addEventListener("pointermove", e=>{
    handleHover(e);
    if(!dragging) return;
    const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
    tAzim -= dx*0.008;
    const az=opts.lockPolar?0.5:2.6; tAzim=Math.max(-az,Math.min(az,tAzim));

  el.addEventListener("wheel", e=>{ e.preventDefault(); tDist=Math.max(16,Math.min(58, tDist + e.deltaY*0.02)); invalidate(); }, {passive:false});

  // board data
  const tilesById = {};
  let cells = [], answer=null, cX=0, cZ=0, onPickCb=null, pickMode=false;
  let demon=null, markGroup=new THREE.Group(); board.add(markGroup);
  const raycaster = new THREE.Raycaster(); const ptr = new THREE.Vector2();
  let hovered=null;

  function build(preset) {
    // dispose old
    board.traverse(o=>{ if(o.isMesh){ o.geometry&&o.geometry.dispose&&o.geometry.dispose(); if(o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose&&m.dispose()); } } });
    while(board.children.length) board.remove(board.children[0]);
    for (const k in tilesById) delete tilesById[k];
    markGroup = new THREE.Group(); board.add(markGroup); demon=null;

    cells = preset.board.map(c=>({...c, id:c.col+"-"+c.row}));
    answer = preset.answerCell;
    let sx=0,sz=0; for(const c of cells){ const w=hexWorld(c.col,c.row); sx+=w.x; sz+=w.z; }
    cX=sx/cells.length; cZ=sz/cells.length;

    // base slab + brass rim
    const dep=0.7;
    const base=new THREE.Mesh(new THREE.BoxGeometry(COLS*SIZE*1.95, dep*0.7, ROWS*SIZE*1.75), new THREE.MeshStandardMaterial({color:0x3a2c1a,roughness:0.95}));
    base.position.y=-dep*0.45; base.receiveShadow=true; board.add(base);
    const rim=new THREE.Mesh(new THREE.BoxGeometry(COLS*SIZE*2.02, dep*0.3, ROWS*SIZE*1.82), new THREE.MeshStandardMaterial({color:0x8a6a3a,roughness:0.6,metalness:0.3}));
    rim.position.y=-dep*0.72; board.add(rim);

    const hexGeo = new THREE.ExtrudeGeometry(hexShape(), {depth:dep, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.05, bevelSegments:1});
    hexGeo.rotateX(-Math.PI/2);
    const waterGeo = new THREE.ExtrudeGeometry(hexShape(), {depth:dep*0.55, bevelEnabled:true, bevelThickness:0.04, bevelSize:0.04, bevelSegments:1});
    waterGeo.rotateX(-Math.PI/2);

    const railCells = cells.filter(c=>c.rail);

    for (const c of cells) {
      const w = hexWorld(c.col,c.row); const t=TERRAIN[c.terrain];
      const grp = new THREE.Group(); grp.position.set(w.x-cX, 0, w.z-cZ);
      const isWater = !!t.water;
      const mat = new THREE.MeshStandardMaterial({ color:isWater?t.color:0xffffff, map:isWater?null:terrainTexture(t.color), roughness:isWater?0.28:0.9, metalness:isWater?0.35:0.05 });
      const tile = new THREE.Mesh(isWater?waterGeo:hexGeo, mat);
      tile.castShadow=true; tile.receiveShadow=true; tile.userData={cell:c, baseY:0, mat};
      grp.add(tile);
      // ink edge on top (ตัดขอบ hex)
      const edges = new THREE.LineSegments(new THREE.EdgesGeometry(isWater?waterGeo:hexGeo), new THREE.LineBasicMaterial({color:0x4a3826, transparent:true, opacity:0.6}));
      grp.add(edges);
      grp.userData = { cell:c, tile, baseY:0 };
      board.add(grp); tilesById[c.id]=grp;

      // features
      for (const f of c.features) { const surfY=(isWater?dep*0.55:dep); const b=makeBuilding(f); b.position.y=surfY; grp.add(b); const sp=emojiSprite(FEATURE[f].icon,0.8); sp.position.set(0.34, surfY+FEATURE[f].h+0.36, 0); grp.add(sp); }

      // rail: draw a half-stub from center toward each rail neighbour (meets neighbour's stub at the shared edge)
      if (c.rail) {
        const surfY = dep + 0.02;
        for (const nb of railCells) {
          if (nb.id === c.id || hdist(c, nb) !== 1) continue;
          const wn = hexWorld(nb.col, nb.row);
          const dx = (wn.x - w.x), dz = (wn.z - w.z);
          const ang = Math.atan2(dz, dx);
          const half = Math.hypot(dx, dz) / 2;
          grp.add(makeRailStub(ang, half, surfY));
        }
      }
      // demon (hidden)
      if (c.col===answer.col && c.row===answer.row) {
        demon = new THREE.Group();
        const oct=new THREE.Mesh(new THREE.OctahedronGeometry(0.5,0), new THREE.MeshStandardMaterial({color:0x9a2a1e, emissive:0x3a0a06, roughness:0.4, metalness:0.3}));
        demon.add(oct); const dsp=emojiSprite("👹",1.2); dsp.position.y=1.0; demon.add(dsp);
        demon.position.set(0, dep+1.5, 0); demon.visible=false; grp.add(demon);
      }
    }
    // (rail drawn per-tile as stubs inside tile loop above, so it lifts with hover)

    // cascade in
    if (!reduce()) { for (const id in tilesById){ const g=tilesById[id]; const c=g.userData.cell; g.position.y=6; tween(g.position,{y:0},420,easeOutBack,null); tweens[tweens.length-1].t0=performance.now()+(c.col+c.row)*26; } }
    frameCam(); invalidate();
  }

  function frameCam(){ tDist=30; tPolar=52*Math.PI/180; tAzim=0; }

  function clearMarks() {
    for (const id in tilesById) {
      const g = tilesById[id];
      for (let i = g.children.length - 1; i >= 0; i--) if (g.children[i].userData && g.children[i].userData.isMark) g.remove(g.children[i]);
    }
  }
  function setMarks(marks, freshId) {
    clearMarks();
    for (const cid in marks) {
      const g = tilesById[cid]; if (!g) continue;
      const entries = Object.keys(marks[cid]);
      entries.forEach((pi, k) => {
        const ang = (Math.PI*2/Math.max(entries.length,1))*k - Math.PI/2;
        const rx = Math.cos(ang)*0.42, rz = Math.sin(ang)*0.42;   // LOCAL to tile centre
        const hit = marks[cid][pi] === "hit";
        const disc = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.12,20), new THREE.MeshStandardMaterial({color:PCOLOR[pi],roughness:0.5,metalness:0.2}));
        disc.position.set(rx, 0.82, rz); disc.castShadow = true; disc.userData = { isMark:true };
        g.add(disc);
        if (!hit) {
          for (const rot of [Math.PI/4, -Math.PI/4]) {
            const bar = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.05,0.07), new THREE.MeshStandardMaterial({color:0xfff4d8}));
            bar.position.set(rx,0.9,rz); bar.rotation.y = rot; bar.userData = { isMark:true }; g.add(bar);
          }
        }
        if (cid === freshId && !reduce()) { disc.position.y = 1.8; tween(disc.position, {y:0.82}, 420, easeOutBack, null); }
      });
    }
    invalidate();
  }

  function reveal(){ if(demon){ demon.visible=true; if(!reduce()){ demon.scale.set(0.1,0.1,0.1); tween(demon.scale,{x:1,y:1,z:1},500,easeOutBack,null);} } invalidate(); }

  function impact(cellId, colorHex){
    const g=tilesById[cellId]; if(!g) return;
    const ring=new THREE.Mesh(new THREE.TorusGeometry(0.5,0.05,8,32), new THREE.MeshBasicMaterial({color:colorHex||0x9a2a1e, transparent:true}));
    ring.rotation.x=-Math.PI/2; ring.position.set(g.position.x,0.75,g.position.z); board.add(ring);
    const s={v:0.4,o:0.9}; tween(s,{v:2.4,o:0},520,x=>x,()=>{ board.remove(ring); ring.geometry.dispose(); ring.material.dispose(); });
    const upd=()=>{ ring.scale.set(s.v,s.v,s.v); ring.material.opacity=s.o; if(s.o>0) requestAnimationFrame(upd); }; upd();
    invalidate();
  }

  function shake(){ if(reduce())return; const s={t:0}; tween(s,{t:1},380,x=>x,null); const base=cam.position.clone(); const iv=setInterval(()=>{ cam.position.x=base.x+(Math.random()-0.5)*0.6; cam.position.y=base.y+(Math.random()-0.5)*0.4; },16); setTimeout(()=>clearInterval(iv),380); }

  function flyBird(cellId, cb){
    const g=tilesById[cellId]; if(!g){ cb&&cb(); return; }
    if(reduce()){ cb&&cb(); return; }
    const sp=emojiSprite("🕊️",1.0); const start=new THREE.Vector3(-COLS,3,g.position.z);
    const end=new THREE.Vector3(g.position.x,0.9,g.position.z);
    const ctrl=new THREE.Vector3((start.x+end.x)/2,4.5,(start.z+end.z)/2);
    sp.position.copy(start); board.add(sp);
    const s={k:0}; tween(s,{k:1},680,x=>1-Math.pow(1-x,2),()=>{ board.remove(sp); cb&&cb(); });
    const upd=()=>{ const k=s.k; const p=new THREE.Vector3().copy(start).multiplyScalar((1-k)*(1-k)).add(new THREE.Vector3().copy(ctrl).multiplyScalar(2*(1-k)*k)).add(new THREE.Vector3().copy(end).multiplyScalar(k*k)); sp.position.copy(p); sp.scale.y=0.7+0.3*Math.abs(Math.sin(k*Math.PI*6)); if(k<1)requestAnimationFrame(upd); }; upd(); invalidate();
  }
  function dropDagger(cellId, cb){
    const g=tilesById[cellId]; if(!g){ cb&&cb(); return; }
    if(reduce()){ cb&&cb(); return; }
    const sp=emojiSprite("🗡️",1.4); sp.position.set(g.position.x,8,g.position.z); board.add(sp);
    tween(sp.position,{y:0.9},400,x=>x*x,()=>{ board.remove(sp); cb&&cb(); });
    const upd=()=>{ if(sp.parent){ requestAnimationFrame(upd);} }; upd(); invalidate();
  }

  let isPickable = null;
  function setPickMode(on, cb, pickable){ pickMode=on; onPickCb=cb; isPickable = pickable||null; el.style.cursor=on?"pointer":"default"; invalidate(); }

  // hover + pick raycast
  function pick(e){ const r=el.getBoundingClientRect(); ptr.x=((e.clientX-r.left)/r.width)*2-1; ptr.y=-((e.clientY-r.top)/r.height)*2+1; raycaster.setFromCamera(ptr,cam); const hits=raycaster.intersectObjects(Object.values(tilesById).map(g=>g.userData.tile),false); return hits[0]?hits[0].object.userData.cell:null; }
  function handleHover(e){
    const cell = pick(e);
    const id = cell?cell.id:null;
    if(id===hovered) return;
    if(hovered && tilesById[hovered]){ const g=tilesById[hovered]; tween(g.position,{y:g.userData.baseY},140,x=>x,null); g.userData.tile.material.emissive&&g.userData.tile.material.emissive.setHex(0x000000); }
    hovered=id;
    if(id && tilesById[id]){ const g=tilesById[id]; if(!reduce()) tween(g.position,{y:g.userData.baseY+0.22},140,easeOutBack,null); g.userData.tile.material.emissive&&g.userData.tile.material.emissive.setHex(pickMode?0x3a2e0a:0x241c12); board.appendChild?board.add(g):board.add(g); }
    invalidate();
  }
  el.addEventListener("click", e=>{ if(!pickMode)return; const cell=pick(e); if(cell && isPickable && !isPickable(cell)) return; if(cell && onPickCb){ const cb=onPickCb; setPickMode(false,null); cb(cell.id); } });

  // render loop (host: continuous; lite: on-demand)
  let needsRender=true, running=true;
  function invalidate(){ needsRender=true; }
  function loop(now){
    if(!running) return;
    requestAnimationFrame(loop);
    if(document.hidden) return;
    stepTweens(now||performance.now());
    // damping
    polar+=(tPolar-polar)*0.12; azim+=(tAzim-azim)*0.12; dist+=(tDist-dist)*0.12; applyCam();
    if(demon&&demon.visible&&!reduce()){ demon.rotation.y+=0.03; demon.children[0].position.y=Math.sin((now||0)*0.003)*0.12; needsRender=true; }
    const moving = Math.abs(tPolar-polar)>1e-4||Math.abs(tAzim-azim)>1e-4||Math.abs(tDist-dist)>1e-4||tweens.length>0;
    if(opts.lite){ if(needsRender||moving){ renderer.render(scene,cam); needsRender=false; } }
    else { renderer.render(scene,cam); }
  }
  requestAnimationFrame(loop);

  function resize(){ const w=container.clientWidth||800, h=container.clientHeight||500; renderer.setSize(w,h); cam.aspect=w/h; cam.updateProjectionMatrix(); invalidate(); }
  const ro = new ResizeObserver(resize); ro.observe(container);

  function dispose(){ running=false; ro.disconnect(); renderer.dispose(); if(renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement); }

  return { build, setMarks, reveal, impact, shake, flyBird, dropDagger, setPickMode, resize, dispose, winFx:(id)=>{impact(id,0x9a2a1e);setTimeout(()=>impact(id,0xe9c46a),180);setTimeout(()=>impact(id,0x9a2a1e),360);} };
}
function easeOutBack(x){ const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(x-1,3)+c1*Math.pow(x-1,2); }

window.B3D = { create: createBoard3D, THREE };
window.dispatchEvent(new Event("b3d-ready"));
</script>

<script>// ═══════════════════════════════════════════════════════════

// ── hex math ─────────────────────────────────────────────
const hpos = (c, r) => ({ x: HS * 1.75 * c + (r % 2 ? HS * 0.875 : 0) + HS, y: HS * 1.52 * r + HS });
const hpts = (cx, cy, rr) => Array.from({ length: 6 }, (_, i) => { const a = (Math.PI / 180) * (60 * i - 30); return (cx + rr * Math.cos(a)).toFixed(1) + "," + (cy + rr * Math.sin(a)).toFixed(1); }).join(" ");
const toCube = (c, r) => { const x = c - (r - (r & 1)) / 2; return { x: x, y: -x - r, z: r }; };
const hdist = (a, b) => { const A = toCube(a.col, a.row), B = toCube(b.col, b.row); return Math.max(Math.abs(A.x - B.x), Math.abs(A.y - B.y), Math.abs(A.z - B.z)); };

// ── clue evaluator (board cells from preset) ─────────────
function evalClue(clue, cell, cells) {
  const p = clue.params || {};
  switch (clue.type) {
    case "within_feat": { const ts = cells.filter(c => c.features.includes(p.feat)); return ts.length > 0 && ts.some(t => hdist(cell, t) <= p.dist); }
    case "within_feat_or": { const ts = cells.filter(c => c.features.some(f => p.feats.includes(f))); return ts.length > 0 && ts.some(t => hdist(cell, t) <= p.dist); }
    case "within_terrain": { if (cell.terrain === p.terrain) return true; const ts = cells.filter(c => c.terrain === p.terrain); return ts.some(t => hdist(cell, t) <= p.dist); }
    case "on_terrain": return cell.terrain === p.terrain;
    case "on_terrain_or": return p.terrains.includes(cell.terrain);
    case "on_rail": return cell.rail;
    case "within_rail": { const ts = cells.filter(c => c.rail); return ts.some(t => hdist(cell, t) <= p.dist); }
    default: return false;
  }
}

// ── SFX: synthesized board-game sounds (WebAudio, no external files) ──
const SFX = (function () {
  let ctx = null, on = false, master = null;
  function ensure() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); master = ctx.createGain(); master.gain.value = 0.5; master.connect(ctx.destination); }
      catch (e) { ctx = null; }
    }
    if (ctx && ctx.state === "suspended") ctx.resume();
  }
  function tone(freq, dur, type, vol, glideTo, delay) {
    if (!on || !ctx) return;
    const t0 = ctx.currentTime + (delay || 0);
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || "sine"; o.frequency.setValueAtTime(freq, t0);
    if (glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.3, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(master); o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(dur, vol, filterFreq, delay) {
    if (!on || !ctx) return;
    const t0 = ctx.currentTime + (delay || 0);
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = filterFreq || 1200;
    const g = ctx.createGain(); g.gain.value = vol || 0.2;
    src.connect(f); f.connect(g); g.connect(master); src.start(t0);
  }
  return {
    toggle() { ensure(); on = !on; if (on) this.paper(); return on; },
    isOn() { return on; },
    prime() { ensure(); },      // call on first gesture so ctx is unlocked
    place() { ensure(); tone(180, 0.09, "triangle", 0.28); noise(0.06, 0.12, 900); },   // wood tap
    wing() { ensure(); noise(0.14, 0.09, 500); noise(0.12, 0.07, 700, 0.14); },          // flap
    clash() { ensure(); tone(320, 0.18, "sawtooth", 0.24, 90); noise(0.12, 0.22, 2600); }, // metal
    paper() { ensure(); noise(0.22, 0.1, 3200); },                                        // page turn
    tick() { ensure(); tone(660, 0.05, "square", 0.14); },                                // turn cue
    win() { ensure(); [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.4, "triangle", 0.28, null, i * 0.11)); },
    fail() { ensure(); tone(150, 0.5, "sawtooth", 0.3, 60); noise(0.3, 0.18, 400); },
    stamp() { ensure(); tone(90, 0.12, "square", 0.3); noise(0.08, 0.2, 600); },
  };
})();

// ── wax-seal phase transition ────────────────────────────
function waxTransition(glyph, cb) {
  const w = $("waxSeal");
  w.querySelector(".wax-disc").textContent = glyph || "🕯";
  w.classList.remove("show"); void w.offsetWidth;
  w.classList.add("show");
  SFX.stamp();
  setTimeout(() => { if (cb) cb(); }, 450);
  setTimeout(() => w.classList.remove("show"), 900);
}

// ── start: pick preset, build state, go briefing ─────────
function startGame(count) {
  if (!MAPS) { $("loadNote").textContent = "ยังโหลดแผนที่ไม่เสร็จ…"; return; }
  const pool = MAPS.filter(m => m.players === count);
  if (!pool.length) { $("loadNote").textContent = "ไม่มีแผนที่สำหรับ " + count + " คน"; return; }
  const preset = pool[Math.floor(Math.random() * pool.length)];

  // build players: faction order = preset.factions; clue matched by faction
  const players = preset.factions.map((fac, i) => {
    const clue = preset.clues.find(c => c.faction === fac);
    return { idx: i, faction: fac, clue: clue, color: PCOLOR[i] };
  });

  // snake turn order
  const fwd = players.map(p => p.idx);
  const back = fwd.slice().reverse();

  G = {
    preset, count, mode: selMode,
    cells: preset.board.map(c => ({ ...c, id: c.col + "-" + c.row })),
    answer: preset.answerCell,
    players,
    snakeFwd: fwd, snakeBack: back,
    round: 0, stepInRound: 0,
    turnIdx: fwd[0],
    marks: {},          // marks[cellId] = { playerIdx: 'hit'|'miss' }
    log: [],
    over: false, lastMarkCell: null, firstRender: true,
  };
  buildBriefing();
  show("brief");
}

// ── BRIEFING ─────────────────────────────────────────────
function buildBriefing() {
  const facs = G.preset.factions;
  const lang = I18N.getLang();
  $("briefTitle").textContent = I18N.t("caseTitle");
  $("briefSub").textContent = I18N.t("caseSub", { count: G.count });

  const story = I18N.STORY_OPEN[lang][G.count] + " " +
    facs.map(f => I18N.FACTION_I18N[lang][f].line).join(" ") + " " +
    I18N.STORY_CLOSE[lang][G.count];

  // typewriter
  const el = $("briefStory");
  el.innerHTML = "";
  let i = 0;
  const caret = '<span class="brief-caret">▌</span>';
  clearInterval(window.__tw);
  window.__tw = setInterval(() => {
    i++;
    el.innerHTML = story.slice(0, i) + caret;
    if (i >= story.length) { clearInterval(window.__tw); el.innerHTML = story; renderBriefFactions(); }
  }, 16);

  // faction cards hidden until story done (but render container now empty)
  $("briefFactions").innerHTML = "";
}

// ── QR distribute ────────────────────────────────────────
let qrIdx = 0;
function buildQR() { qrIdx = 0; renderQR(); }
function renderQR() {
  const p = G.players[qrIdx];
  const fc = FACTION[p.faction];
  const lang = I18N.getLang();
  $("qrTitle").textContent = I18N.t("qrTitleFor", { n: qrIdx + 1 });
  // URL companion: same origin, ?map=index&p=playerIdx
  const base = location.href.replace(/host\.html.*$/, "companion.html");
  const url = base + "?map=" + G.preset.index + "&p=" + qrIdx + "&mode=" + G.mode;

  // generate QR
  const box = $("qrBox");
  box.innerHTML = "";
  try {
    const qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    box.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 0, scalable: true });
    const svg = box.querySelector("svg");
    if (svg) { svg.setAttribute("width", "240"); svg.setAttribute("height", "240"); }
  } catch (e) {
    box.innerHTML = '<div style="padding:30px;color:#9a2a1e;font-size:0.8rem">' + I18N.t("qrGenFail") + '</div>';
  }

  $("qrPlayer").textContent = I18N.t("playerLabel") + " " + (qrIdx + 1);
  $("qrPlayer").style.color = p.color;
  $("qrFaction").textContent = G.mode === "hidden" ? I18N.t("factionSealed") : fc.icon + " " + I18N.FACTION_I18N[lang][p.faction].name;
  // fallback link for same-device testing (opens new tab)
  const lk = $("qrLink");
  if (lk) {
    lk.innerHTML = '<a href="' + url + '" target="_blank" style="color:var(--sepia)">' + I18N.t("openInNewTab") + '</a>';
  }

  // dots
  const dots = $("qrDots");
  dots.innerHTML = "";
  G.players.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "qr-dot" + (i < qrIdx ? " done" : i === qrIdx ? " cur" : "");
    dots.appendChild(dot);
  });

  $("qrPrev").style.visibility = qrIdx === 0 ? "hidden" : "visible";
  $("qrNext").textContent = qrIdx === G.players.length - 1 ? "ทุกคนพร้อม · เริ่มเกม →" : "ถัดไป →";
}
$("qrPrev").onclick = () => { if (qrIdx > 0) { qrIdx--; renderQR(); } };
$("qrNext").onclick = () => {
  if (qrIdx < G.players.length - 1) { qrIdx++; renderQR(); SFX.paper(); }
  else { waxTransition("🗺️", startBoard); }
};

// board rendering
function renderBoard(opts) {
  opts = opts || {};
  // ── 3D path: sync marks / pick / reveal, keep DOM ribbon overlay ──
  if (USE_3D && board3d) {
    if (!G._built3d) { board3d.build(G.preset); G._built3d = true; }
    board3d.setMarks(G.marks, G.lastMarkCell);
    if (opts.revealAnswer) board3d.reveal();
    const area = $("boardArea");
    removeRibbon();
    area.classList.remove("picking");
    if (opts.selectable) {
      area.classList.add("picking");
      board3d.setPickMode(true, (cellId) => { area.classList.remove("picking"); removeRibbon(); opts.onPick(cellId); }, (cell) => cell.features.length === 0);
      const ribbon = document.createElement("div");
      ribbon.className = "pick-ribbon show"; ribbon.id = "pickRibbon";
      ribbon.innerHTML = '<span>' + (opts.pickLabel || "เลือกช่องบนกระดาน") + '</span><button class="pr-cancel" id="prCancel">ยกเลิก</button>';
      area.appendChild(ribbon);
      $("prCancel").onclick = (e) => { e.stopPropagation(); area.classList.remove("picking"); removeRibbon(); board3d.setPickMode(false, null); setArmed(null); renderBoard(); renderLog(); };
    } else {
      board3d.setPickMode(false, null);
    }
    return;
  }
  const cells = G.cells;
  const svgW = HS * 1.75 * COLS + HS * 2, svgH = HS * 1.52 * ROWS + HS * 2;
  let s = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg">';

  // rail segments: build first, draw after hexes so rail shows. Lab dashed style
  let railSvg = "";
  const rail = cells.filter(c => c.rail);
  for (const a of rail) for (const b of rail) {
    if (a.id < b.id && hdist(a, b) === 1) {
      const pa = hpos(a.col, a.row), pb = hpos(b.col, b.row);
      railSvg += '<line x1="' + pa.x + '" y1="' + pa.y + '" x2="' + pb.x + '" y2="' + pb.y + '" stroke="#3a2c1a" stroke-width="3" stroke-linecap="round" opacity="0.75"/>';
      railSvg += '<line x1="' + pa.x + '" y1="' + pa.y + '" x2="' + pb.x + '" y2="' + pb.y + '" stroke="#c4b596" stroke-width="0.9" stroke-dasharray="2 4" stroke-linecap="round"/>';
    }
  }

  // hexes
  const cascade = G.firstRender;
  for (const cell of cells) {
    const pos = hpos(cell.col, cell.row);
    const pts = hpts(pos.x, pos.y, HS - 1.5);
    const t = TERRAIN[cell.terrain];
    const selectable = opts.selectable && (!opts.filter || opts.filter(cell)) && cell.features.length === 0;
    // tile cascade: diagonal wave placement on first board render
    let tileStyle = "";
    if (cascade) {
      const delay = ((cell.col + cell.row) * 0.028).toFixed(3);
      tileStyle = ' style="transform-box:fill-box;transform-origin:center;animation:tileDrop 0.42s cubic-bezier(0.2,0.9,0.3,1.2) both;animation-delay:' + delay + 's"';
    }
    s += '<polygon points="' + pts + '" fill="' + t.fill + '" stroke="#5a4632" stroke-width="0.7"' + tileStyle + ' ' +
      (selectable ? 'class="cellpick" data-id="' + cell.id + '"' : '') + '/>';
    if (selectable) {
      // hover-lift overlay: glows and lifts on hover (board-game "reach for a tile")
      s += '<polygon points="' + pts + '" fill="#fff4d8" opacity="0" class="cellpick cell-hover" data-id="' + cell.id + '" style="cursor:pointer;transition:opacity .13s;transform-box:fill-box;transform-origin:center" onmouseover="this.setAttribute(\'opacity\',\'0.32\');this.style.transform=\'scale(1.08)\'" onmouseout="this.setAttribute(\'opacity\',\'0\');this.style.transform=\'scale(1)\'"/>';
    }
  }
  if (cascade) G.firstRender = false;

  // วาดรางทับบน hex
  s += railSvg;

  // features
  for (const cell of cells) {
    const pos = hpos(cell.col, cell.row);
    for (const f of cell.features) {
      s += '<text x="' + pos.x + '" y="' + (pos.y + 1) + '" text-anchor="middle" dominant-baseline="middle" font-size="14" style="pointer-events:none">' + FEATURE[f].icon + '</text>';
    }
  }

  // markers (public): tokens placed around cell per player
  for (const cell of cells) {
    const m = G.marks[cell.id];
    if (!m) continue;
    const pos = hpos(cell.col, cell.row);
    const entries = Object.keys(m);
    const fresh = (cell.id === G.lastMarkCell);
    entries.forEach((pi, k) => {
      const total = entries.length;
      const ang = (Math.PI * 2 / Math.max(total, 1)) * k - Math.PI / 2;
      const rx = pos.x + Math.cos(ang) * 9;
      const ry = pos.y + Math.sin(ang) * 9;
      const color = PCOLOR[pi];
      const data = ' class="mk" data-pi="' + pi + '" data-hit="' + (m[pi] === "hit" ? "1" : "0") + '" data-coord="' + cell.col + ',' + cell.row + '"';
      // fresh markers drop with weight + a landing shadow underneath
      const anim = fresh ? ' style="transform-box:fill-box;transform-origin:' + rx + 'px ' + ry + 'px;animation:markerDrop 0.5s cubic-bezier(0.2,0.8,0.3,1.3) both;cursor:help"' : ' style="cursor:help"';
      if (fresh) {
        s += '<ellipse cx="' + rx + '" cy="' + (ry + 3) + '" rx="6" ry="2.4" fill="#241c12" style="transform-box:fill-box;transform-origin:' + rx + 'px ' + (ry + 3) + 'px;animation:landShadow 0.5s ease both;pointer-events:none"/>';
      }
      if (m[pi] === "hit") {
        s += '<circle cx="' + rx + '" cy="' + ry + '" r="4.5" fill="' + color + '" stroke="#fff4d8" stroke-width="0.8"' + data + anim + '/>';
      } else {
        s += '<g' + data + anim + '><line x1="' + (rx - 3) + '" y1="' + (ry - 3) + '" x2="' + (rx + 3) + '" y2="' + (ry + 3) + '" stroke="' + color + '" stroke-width="1.6" stroke-linecap="round"/><line x1="' + (rx + 3) + '" y1="' + (ry - 3) + '" x2="' + (rx - 3) + '" y2="' + (ry + 3) + '" stroke="' + color + '" stroke-width="1.6" stroke-linecap="round"/><circle cx="' + rx + '" cy="' + ry + '" r="6" fill="transparent" stroke="none"/></g>';
      }
    });
  }

  // answer reveal
  if (opts.revealAnswer) {
    const pos = hpos(G.answer.col, G.answer.row);
    const pts = hpts(pos.x, pos.y, HS - 1.5);
    s += '<polygon points="' + pts + '" fill="none" stroke="#9a2a1e" stroke-width="3"/>';
    s += '<text x="' + pos.x + '" y="' + (pos.y + 1) + '" text-anchor="middle" dominant-baseline="middle" font-size="18">👹</text>';
  }

  s += "</svg>";
  const area = $("boardArea");
  area.innerHTML = s;

  if (opts.selectable) {
    area.classList.add("picking");
    area.querySelectorAll(".cellpick").forEach(el => {
      el.addEventListener("click", () => { area.classList.remove("picking"); removeRibbon(); opts.onPick(el.dataset.id); });
    });
    // ribbon with cancel
    removeRibbon();
    const ribbon = document.createElement("div");
    ribbon.className = "pick-ribbon show";
    ribbon.id = "pickRibbon";
    ribbon.innerHTML = '<span>' + (opts.pickLabel || "เลือกช่องบนกระดาน") + '</span><button class="pr-cancel" id="prCancel">ยกเลิก</button>';
    area.appendChild(ribbon);
    $("prCancel").onclick = (e) => {
      e.stopPropagation();
      area.classList.remove("picking");
      removeRibbon();
      setArmed(null);
      renderBoard();
      renderLog();
    };
  } else {
    area.classList.remove("picking");
    removeRibbon();
  }
  attachMarkerTips();
}
function removeRibbon() { const r = $("pickRibbon"); if (r) r.remove(); }

// ── marker tooltip (hover desktop / tap-hold iPad) ───────
function attachMarkerTips() {
  const tip = $("mkTip");
  const showTip = (el, cx, cy) => {
    const pi = +el.dataset.pi, hit = el.dataset.hit === "1", coord = el.dataset.coord;
    const p = G.players[pi]; if (!p) return;
    const fc = FACTION[p.faction];
    const lang = I18N.getLang();
    const who = G.mode === "hidden" ? I18N.t("playerLabel") + " " + (pi + 1) : fc.icon + " " + I18N.t("playerLabel") + " " + (pi + 1) + " \u00b7 " + I18N.FACTION_I18N[lang][p.faction].name;
    const verdict = hit ? '<b>' + I18N.t("hitTip") + '</b>' : '<b>' + I18N.t("missTip") + '</b>';
    tip.innerHTML = '<div style="color:' + PCOLOR[pi] + ';font-weight:800;margin-bottom:2px">' + who + '</div>' +
      '<div style="font-size:0.7rem">(' + coord + ')</div>' +
      '<div style="font-size:0.72rem;margin-top:3px">' + verdict + '</div>';
    tip.style.display = "block";
    // position near point, clamp to viewport
    requestAnimationFrame(() => {
      const w = tip.offsetWidth, h = tip.offsetHeight;
      let x = cx + 14, y = cy - h - 10;
      if (x + w > innerWidth - 8) x = cx - w - 14;
      if (y < 8) y = cy + 16;
      tip.style.left = x + "px"; tip.style.top = y + "px";
      tip.classList.add("show");
    });
  };
  const hideTip = () => { tip.classList.remove("show"); setTimeout(() => { if (!tip.classList.contains("show")) tip.style.display = "none"; }, 150); };

  $("boardArea").querySelectorAll(".mk").forEach(el => {
    // desktop hover
    el.addEventListener("mouseenter", e => showTip(el, e.clientX, e.clientY));
    el.addEventListener("mousemove", e => { if (tip.classList.contains("show")) { tip.style.left = (e.clientX + 14) + "px"; } });
    el.addEventListener("mouseleave", hideTip);
    // touch: tap-hold
    let holdTimer = null;
    el.addEventListener("touchstart", e => {
      const t = e.touches[0];
      holdTimer = setTimeout(() => showTip(el, t.clientX, t.clientY), 280);
    }, { passive: true });
    el.addEventListener("touchend", () => { clearTimeout(holdTimer); hideTip(); });
    el.addEventListener("touchmove", () => { clearTimeout(holdTimer); });
  });
}

function setArmed(which) {
