<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Dossier - How to Play</title>
<style>
  :root{
    --paper:#e9e1cd; --paper2:#e2d8bf; --ink:#241c12; --ink2:#5a4c38; --ink3:#8a7a62;
    --rule:#c4b596; --red:#9a2a1e; --sepia:#8a6a3a;
    --cw:#8a6a28; --se:#6a4a7a; --as:#9a3a2a; --la:#a07028; --cr:#3a5a72;
    --ease-out: cubic-bezier(0.2, 0.8, 0.3, 1);
    --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.25);
    --t-fast: 140ms; --t-base: 220ms;
    --sp-1:8px; --sp-2:16px; --sp-3:24px; --sp-4:40px; --sp-5:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);}
  body{
    background:
      repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(120,90,50,0.012) 3px, rgba(120,90,50,0.012) 4px),
      radial-gradient(ellipse 100% 55% at 50% 0%, #efe8d6, #e4dabf);
    min-height:100dvh; padding:var(--sp-4) var(--sp-3) var(--sp-5);
  }
  .sheet{max-width:760px;margin:0 auto;}
  /* editorial header (matches index / host) */
  .kicker{font-size:0.7rem;letter-spacing:0.4em;color:var(--red);text-transform:uppercase;font-weight:700;text-align:center;margin-bottom:var(--sp-1);}
  .title{font-size:clamp(2.2rem,7vw,3.4rem);font-weight:900;line-height:0.98;letter-spacing:-0.02em;text-align:center;text-shadow:0 2px 0 rgba(255,255,255,0.4);}
  .rule{display:flex;align-items:center;gap:14px;margin:var(--sp-2) 0 var(--sp-3);}
  .rule:before,.rule:after{content:"";flex:1;border-top:2px solid var(--ink);border-bottom:1px solid var(--ink);}
  .rule span{font-size:0.64rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink2);white-space:nowrap;}
  .lede{font-size:0.98rem;line-height:1.75;color:var(--ink2);font-style:italic;text-align:center;max-width:600px;margin:0 auto var(--sp-4);}

  section{margin-bottom:var(--sp-4);animation:rise var(--t-base) var(--ease-out) both;}
  h2{font-size:1.3rem;font-weight:800;color:var(--ink);display:flex;align-items:baseline;gap:10px;margin-bottom:var(--sp-2);
     border-bottom:2px solid var(--ink);padding-bottom:6px;}
  h2 .n{font-size:0.8rem;font-weight:700;color:var(--red);letter-spacing:0.1em;}
  h3{font-size:1rem;font-weight:800;color:var(--sepia);margin:var(--sp-2) 0 6px;}
  p{font-size:0.92rem;line-height:1.72;color:var(--ink2);margin-bottom:10px;}
  strong{color:var(--ink);font-weight:800;}
  ul,ol{margin:0 0 12px 22px;}
  li{font-size:0.92rem;line-height:1.7;color:var(--ink2);margin-bottom:6px;}
  .card{background:var(--paper2);border:1px solid var(--rule);border-left:4px solid var(--sepia);
        padding:14px 16px;border-radius:3px;margin:12px 0;box-shadow:2px 2px 0 rgba(36,28,18,0.12);}
  .card.investigate{border-left-color:var(--sepia);}
  .card.strike{border-left-color:var(--red);}
  .card.warn{border-left-color:var(--red);background:rgba(154,42,30,0.06);}
  .card h3{margin-top:0;}
  .steps{counter-reset:step;list-style:none;margin-left:0;}
  .steps li{position:relative;padding-left:34px;margin-bottom:12px;}
  .steps li:before{counter-increment:step;content:counter(step);position:absolute;left:0;top:-1px;
    width:22px;height:22px;border-radius:2px;background:var(--ink);color:var(--paper);font-size:0.78rem;
    font-weight:800;display:flex;align-items:center;justify-content:center;}
  .clue-grid{display:grid;grid-template-columns:1fr;gap:8px;margin:12px 0;}
  .clue-row{display:flex;gap:12px;align-items:flex-start;background:var(--paper2);border:1px solid var(--rule);
    border-radius:3px;padding:10px 12px;}
  .clue-row .ic{font-size:1.3rem;flex-shrink:0;line-height:1.3;}
  .clue-row .tx{font-size:0.86rem;line-height:1.55;color:var(--ink2);}
  .clue-row .tx b{color:var(--ink);}
  .facs{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
  .fac{flex:1;min-width:130px;background:var(--paper2);border:1px solid var(--rule);border-top:3px solid;
    border-radius:3px;padding:10px 12px;}
  .fac .fn{font-weight:800;font-size:0.9rem;margin-bottom:2px;}
  .fac .fd{font-size:0.76rem;color:var(--ink3);line-height:1.5;}
  .fac.cw{border-top-color:var(--cw);} .fac.cw .fn{color:var(--cw);}
  .fac.se{border-top-color:var(--se);} .fac.se .fn{color:var(--se);}
  .fac.as{border-top-color:var(--as);} .fac.as .fn{color:var(--as);}
  .fac.la{border-top-color:var(--la);} .fac.la .fn{color:var(--la);}
  .fac.cr{border-top-color:var(--cr);} .fac.cr .fn{color:var(--cr);}
  .terr{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0;}
  .terr .t{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--ink2);
    background:var(--paper2);border:1px solid var(--rule);border-radius:3px;padding:5px 10px;}
  .terr .sw{width:14px;height:14px;border-radius:2px;border:1px solid rgba(36,28,18,0.3);}
  .backlink{display:inline-flex;align-items:center;gap:6px;margin-top:var(--sp-2);font-size:0.82rem;
    color:var(--sepia);text-decoration:none;border:1px dashed var(--rule);border-radius:3px;padding:7px 16px;
    transition:all var(--t-fast) var(--ease-out);}
  .backlink:hover{color:var(--ink);border-color:var(--ink2);background:var(--paper2);}
  .foot{text-align:center;margin-top:var(--sp-4);color:var(--ink3);font-size:0.7rem;font-style:italic;}
  .lang-toggle{position:fixed;top:14px;right:14px;z-index:20;min-width:40px;height:36px;padding:0 10px;border-radius:18px;
    border:1px solid var(--ink2);background:var(--paper2);color:var(--ink);font-size:0.7rem;font-weight:800;letter-spacing:0.03em;
    cursor:pointer;box-shadow:2px 2px 0 rgba(36,28,18,0.16);display:flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;transition:all var(--t-fast) var(--ease-out);}
  .lang-toggle:hover{transform:translateY(-2px);box-shadow:3px 4px 0 rgba(36,28,18,0.22);}
  .lang-toggle:active{transform:translateY(0);box-shadow:1px 1px 0 rgba(36,28,18,0.2);}
  :focus-visible{outline:2px solid var(--sepia);outline-offset:2px;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @media (prefers-reduced-motion: reduce){section{animation:none;}}
  @media print{.lang-toggle,.backlink{display:none;} body{background:#fff;}}
</style>
</head>
<body>
  <button id="langToggle" class="lang-toggle" title="Language">TH</button>
  <div class="sheet">
    <div class="kicker" data-k="kicker"></div>
    <h1 class="title">The Dossier</h1>
    <div class="rule"><span data-k="ruleword"></span></div>
    <p class="lede" data-k="lede"></p>

    <section>
      <h2><span class="n">01</span><span data-k="s1h"></span></h2>
      <p data-k="s1p1"></p>
      <p data-k="s1p2"></p>
    </section>

    <section>
      <h2><span class="n">02</span><span data-k="s2h"></span></h2>
      <p data-k="s2p1"></p>
      <div class="facs" id="facs"></div>
      <p data-k="s2p2"></p>
    </section>

    <section>
      <h2><span class="n">03</span><span data-k="s3h"></span></h2>
      <p data-k="s3p1"></p>
      <div class="terr" id="terr"></div>
      <div class="card warn"><h3 data-k="s3ch"></h3><p data-k="s3cp" style="margin-bottom:0"></p></div>
    </section>

    <section>
      <h2><span class="n">04</span><span data-k="s4h"></span></h2>
      <p data-k="s4p1"></p>

      <p data-k="s4p2"></p>
    </section>

    <section>
      <h2><span class="n">05</span><span data-k="s5h"></span></h2>
      <div class="card investigate">
        <h3>🕵️ <span data-k="s5ih"></span></h3>
        <p data-k="s5ip1"></p>
        <p data-k="s5ip2" style="margin-bottom:0"></p>
      </div>
      <div class="card strike">
        <h3>🔫 <span data-k="s5sh"></span></h3>
        <p data-k="s5sp1"></p>
        <p data-k="s5sp2" style="margin-bottom:0"></p>
      </div>
    </section>

    <section>
      <h2><span class="n">06</span><span data-k="s6h"></span></h2>
      <p data-k="s6p1"></p>
      <ul id="s6list"></ul>
    </section>

    <section>
      <h2><span class="n">07</span><span data-k="s7h"></span></h2>
      <p data-k="s7p1"></p>
      <div class="clue-grid" id="clueGrid"></div>
    </section>

    <section>
      <h2><span class="n">08</span><span data-k="s8h"></span></h2>
      <ul id="s8list"></ul>
    </section>

    <div style="text-align:center">
      <a class="backlink" href="./index.html" data-k="back"></a>
    </div>
    <div class="foot" data-k="foot"></div>
  </div>

const KEY = "dossier_lang";
function getLang(){ try { return localStorage.getItem(KEY) || "en"; } catch(e){ return "en"; } }
function setLang(l){ try { localStorage.setItem(KEY, l); } catch(e){} }
const $ = s => document.querySelector(s);

function render(){
  const lang = getLang();
  const d = R[lang] || R.en;
  document.querySelectorAll("[data-k]").forEach(el => {
    const v = d[el.dataset.k];
    if (typeof v === "string") el.innerHTML = v;
  });
  // factions
  $("#facs").innerHTML = d.facs.map(f =>
    '<div class="fac ' + f[0] + '"><div class="fn">' + f[1] + '</div><div class="fd">' + f[2] + '</div></div>').join("");
  // terrain
  $("#terr").innerHTML = d.terr.map(t =>
    '<span class="t"><span class="sw" style="background:' + t[0] + '"></span>' + t[1] + '</span>').join("");
  // snake steps
  $("#s4steps").innerHTML = d.s4steps.map(s => '<li>' + s + '</li>').join("");
  // win/lose list
  $("#s6list").innerHTML = d.s6list.map(s => '<li>' + s + '</li>').join("");
  // clue types
  $("#clueGrid").innerHTML = d.clues.map(c =>
    '<div class="clue-row"><span class="ic">' + c[0] + '</span><span class="tx">' + c[1] + '</span></div>').join("");
  // tips
  $("#s8list").innerHTML = d.s8list.map(s => '<li>' + s + '</li>').join("");
  document.documentElement.lang = lang;
  $("#langToggle").textContent = lang === "en" ? "TH" : "EN";
  document.title = lang === "en" ? "The Dossier - How to Play" : "The Dossier - วิธีเล่น";
}
$("#langToggle").onclick = () => { setLang(getLang() === "en" ? "th" : "en"); render(); };
render();
</script>
