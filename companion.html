<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Dossier · Companion</title>
<script src="./assets/js/i18n.js"></script>
<script src="./assets/vendor/anime.min.js"></script>
<script src="./assets/js/fx.js"></script>
<style>
:root{
  --paper:#e9e1cd; --paper2:#e2d8bf; --ink:#241c12; --ink2:#5a4c38; --ink3:#8a7a62;
  --rule:#c4b596; --red:#9a2a1e; --sepia:#8a6a3a;
  /* shared motion system (see docs/STYLE_GUIDE.md) */
  --ease-out: cubic-bezier(0.2, 0.8, 0.3, 1);
  --ease-spring: cubic-bezier(0.2, 0.9, 0.3, 1.25);
  --ease-stamp: cubic-bezier(0.3, 1.4, 0.5, 1);
  --t-fast: 140ms; --t-base: 220ms; --t-slow: 550ms;
  /* spacing scale, 8px base (see docs/STYLE_GUIDE.md) */
  --sp-half:4px; --sp-xs:6px; --sp-1:8px; --sp-2:16px; --sp-3:24px; --sp-4:40px; --sp-5:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);height:100%;overflow:hidden;}
body{
  background:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(120,90,50,0.012) 3px, rgba(120,90,50,0.012) 4px),
    radial-gradient(ellipse 90% 50% at 50% 0%, #efe8d6, #e4dabf);
  height:100dvh;
}
.hidden{display:none !important;}

/* error / loading */
.notice{text-align:center;padding:50px 20px;color:var(--ink2);height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.notice .big{font-size:2.6rem;margin-bottom:14px;}
.notice .msg{font-size:0.9rem;line-height:1.7;font-style:italic;max-width:340px;}
.notice .err{color:var(--red);}

/* ── single-screen app ── */
#app{height:100dvh;display:flex;flex-direction:column;animation:fadeIn 0.4s ease both;}

/* compact top header */
.topstrip{flex-shrink:0;border-bottom:2px solid var(--ink);background:var(--paper2);border-top:4px solid;padding:8px 12px;animation:fadeUp 0.45s ease both;}
.ts-crest{display:flex;align-items:center;gap:10px;}
.crest-icon{font-size:1.7rem;line-height:1;}
.ts-info{flex:1;min-width:0;}
.crest-name{font-size:1.05rem;font-weight:900;line-height:1.05;}
.crest-player{font-size:0.62rem;color:var(--ink2);}
.crest-code{font-family:'Courier New',monospace;font-size:0.62rem;font-weight:700;border:1px solid;border-radius:2px;padding:2px 7px;flex-shrink:0;}
.ts-intel{display:flex;align-items:baseline;gap:8px;margin-top:6px;padding-top:6px;border-top:1px dashed var(--rule);}
.ts-intel-label{font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--red);font-weight:700;flex-shrink:0;animation:intelGlow 3.5s ease-in-out infinite;}
@keyframes intelGlow{0%,100%{text-shadow:0 0 0 rgba(154,42,30,0);}50%{text-shadow:0 0 10px rgba(154,42,30,0.45);}}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--rule);margin:-6px auto 10px;}
.intel-text{font-size:0.92rem;line-height:1.3;font-weight:700;}

/* map hero: fills remaining space */
.map-stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;position:relative;}
.map-wrap{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;animation:scaleIn 0.5s 0.15s var(--ease-out) both;}
.map-wrap svg{display:block;width:100%;height:100%;}
.rotate-hint{font-size:0.58rem;color:var(--ink3);font-style:italic;margin-top:4px;flex-shrink:0;opacity:0.75;}
.lang-toggle{position:fixed;top:8px;right:8px;z-index:60;min-width:34px;height:34px;padding:0 9px;border-radius:17px;
  border:1px solid var(--ink2);background:var(--paper);color:var(--ink);font-size:0.66rem;font-weight:800;letter-spacing:0.02em;
  cursor:pointer;box-shadow:1px 1px 0 rgba(36,28,18,0.18);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;}

/* bottom toolbar */
.toolbar{flex-shrink:0;border-top:2px solid var(--ink);background:var(--paper2);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;animation:fadeUp 0.45s 0.1s ease both;}
.markkey{display:flex;gap:10px;flex-wrap:wrap;}
.markkey span{font-size:0.62rem;color:var(--ink2);display:flex;align-items:center;gap:3px;}
.markkey i{font-style:normal;font-weight:800;font-size:0.78rem;}
.mk-c{color:#3a6a3a;}.mk-x{color:#9a2a1e;}.mk-q{color:#6a4a7a;}
.tools-btns{display:flex;gap:7px;flex-shrink:0;}
.tool-btn{font-family:Georgia,serif;font-size:0.72rem;font-weight:700;padding:8px 12px;border:1px solid var(--ink2);background:var(--paper);color:var(--ink);cursor:pointer;border-radius:2px;transition:all var(--t-fast);}
.tool-btn:active{transform:scale(0.95);background:var(--ink);color:var(--paper);}
.tool-btn.notes-btn{border-color:var(--sepia);color:var(--sepia);}

/* bottom sheets (notes / legend) */
.sheet-overlay{position:fixed;inset:0;background:rgba(20,14,8,0.5);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.sheet-overlay.show{display:flex;animation:fadeIn 0.2s ease both;}
.sheet{background:var(--paper);border:1px solid var(--ink);border-bottom:none;border-radius:10px 10px 0 0;width:100%;max-width:560px;padding:16px 18px 24px;box-shadow:0 -6px 24px rgba(36,28,18,0.3);animation:sheetUp var(--t-base) var(--ease-out) both;max-height:80dvh;overflow-y:auto;}
.sheet-head{display:flex;align-items:center;justify-content:space-between;font-size:0.92rem;font-weight:800;margin-bottom:12px;border-bottom:2px solid var(--ink);padding-bottom:8px;}
.sheet-close{border:none;background:none;font-size:1.1rem;cursor:pointer;color:var(--ink2);padding:2px 6px;}
.sheet textarea{width:100%;min-height:140px;font-family:Georgia,serif;font-size:0.9rem;padding:11px 13px;border:1px solid var(--ink);background:var(--paper2);color:var(--ink);resize:vertical;border-radius:3px;line-height:1.5;}
.sheet textarea:focus{outline:2px solid var(--sepia);outline-offset:-1px;}
.btn{font-family:Georgia,serif;font-size:0.74rem;padding:9px 14px;border:1px solid var(--ink2);background:var(--paper);color:var(--ink);cursor:pointer;border-radius:2px;}
.btn.ghost{margin-top:12px;border-style:dashed;color:var(--ink2);width:100%;}
.btn:active{background:var(--ink);color:var(--paper);}
.legend{display:flex;flex-wrap:wrap;gap:8px 12px;}
.leg{display:flex;align-items:center;gap:4px;font-size:0.72rem;color:var(--ink2);}
.leg .sw{width:13px;height:13px;border:1px solid var(--ink3);border-radius:1px;}
.legend-note{font-size:0.66rem;color:var(--ink3);font-style:italic;line-height:1.6;margin-top:12px;padding:8px 10px;background:rgba(120,90,50,0.05);border-left:2px solid var(--rule);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes markPop{0%{transform:scale(0);}70%{transform:scale(1.3);}100%{transform:scale(1);}}
@keyframes markDrop{0%{opacity:0;transform:scale(2.4) translateY(-10px);}55%{opacity:1;transform:scale(0.82) translateY(2px);}75%{transform:scale(1.14) translateY(0);}100%{transform:scale(1) translateY(0);}}
/* per-state entrance so cycling check->cross->q feels directional (see docs/STYLE_GUIDE.md) */
@keyframes markCross{0%{opacity:0;transform:scale(2.2) rotate(-14deg);}50%{opacity:1;transform:scale(0.86) rotate(4deg);}75%{transform:scale(1.12) rotate(-2deg);}100%{transform:scale(1) rotate(0);}}
@keyframes markQ{0%{opacity:0;transform:scale(1.6) rotate(-16deg);}45%{opacity:1;transform:scale(1) rotate(10deg);}70%{transform:rotate(-6deg);}100%{transform:rotate(0);}}
@keyframes tileDrop{0%{transform:translateY(-12px) scale(0.7);}70%{transform:translateY(2px) scale(1.04);}100%{transform:translateY(0) scale(1);}}
@keyframes possibleHint{0%{opacity:0;}25%{opacity:0.9;}55%{opacity:0.5;}100%{opacity:0;}}
@keyframes crestBreath{0%,100%{box-shadow:0 0 0 rgba(154,42,30,0);}50%{box-shadow:0 0 14px rgba(154,42,30,0.12);}}
.crest-icon{animation:crestBreath 4s ease-in-out infinite;border-radius:50%;}
.cell{transition:opacity var(--t-base) var(--ease-out);}
.cell:active{opacity:0.6 !important;}
/* hide rotate hint in landscape (map already big) */
@media(orientation:landscape){.rotate-hint{display:none;} .ts-intel{margin-top:4px;padding-top:4px;}}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms !important;animation-iteration-count:1 !important;}}
:focus-visible{outline:2px solid var(--sepia);outline-offset:2px;}
</style>

</head>
<body>


<div id="loading" class="notice">
  <div class="big">📓</div>
  <div class="msg" data-i18n="loadingCompanion"></div>
</div>

<div id="error" class="notice hidden">
  <div class="big">🔒</div>
  <div class="msg err" id="errMsg"></div>
</div>

<button id="langToggle" class="lang-toggle" title="Language">TH</button>

<div id="app" class="hidden">
  <!-- compact header: faction + intel -->
  <div class="topstrip" id="crest">
    <div class="ts-crest">
      <span class="crest-icon" id="crestIcon"></span>
      <div class="ts-info">
        <div class="crest-name" id="crestName"></div>
        <div class="crest-player" id="crestPlayer"></div>
      </div>
      <span class="crest-code" id="crestCode"></span>
    </div>
    <div class="ts-intel">
      <span class="ts-intel-label" data-i18n="compIntelLabel"></span>
      <span class="intel-text" id="intelText"></span>
    </div>
  </div>

  <!-- map hero -->
  <div class="map-stage">
    <div class="map-wrap" id="mapWrap"></div>
    <div class="rotate-hint" id="rotateHint" data-i18n="compRotateHint"></div>
  </div>

  <!-- bottom toolbar -->
  <div class="toolbar">
    <div class="markkey">
      <span><i class="mk-c">✓</i><span data-i18n="compLikely"></span></span>
      <span><i class="mk-x">✗</i><span data-i18n="compRuledOut"></span></span>
      <span><i class="mk-q">?</i><span data-i18n="compUnsure"></span></span>
    </div>
    <div class="tools-btns">
      <button class="tool-btn" id="openLegend">🗺️ <span data-i18n="compTerrain"></span></button>
      <button class="tool-btn notes-btn" id="openNotes">📝 <span data-i18n="compNotes"></span></button>
    </div>
  </div>

  <!-- NOTES SHEET -->
  <div class="sheet-overlay" id="notesSheet">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-head"><span>📝 <span data-i18n="compNotes"></span></span><button class="sheet-close" id="closeNotes">✕</button></div>
      <textarea id="notes" data-i18n-ph="compNotesPlaceholder"></textarea>
      <button class="btn ghost" id="resetMarks" data-i18n="compClearMarks"></button>
    </div>
  </div>

  <!-- LEGEND SHEET -->
  <div class="sheet-overlay" id="legendSheet">
    <div class="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-head"><span>🗺️ <span data-i18n="compTerrain"></span></span><button class="sheet-close" id="closeLegend">✕</button></div>
      <div class="legend" id="legend"></div>
      <div class="legend-note" data-i18n="compFadeNote"></div>
    </div>
  </div>
</div>


<script>// ═══════════════════════════════════════════════════════════
//  THE DOSSIER · COMPANION (สมุดสายลับ)
// ═══════════════════════════════════════════════════════════
(function () {
"use strict";

const COLS = 13, ROWS = 10, HS = 22;
const TERRAIN = {
  factory:  { fill: "#6b4a2e", label: "ย่านโรงงาน",   icon: "🏭" },
  smog:     { fill: "#cdd2d6", label: "ตรอกหมอกควัน", icon: "🌫️" },
  cemetery: { fill: "#a8d8a8", label: "สุสานเก่า",    icon: "✝" },
  slums:    { fill: "#e8b4c4", label: "สลัมร้าง",     icon: "🏚" },
  harbor:   { fill: "#2a4a78", label: "ท่าเรือ",      icon: "🌊", water: true },
};
const FEATURE = {
  clock_tower: { icon: "🕰", label: "หอนาฬิกา" },
  station:     { icon: "🚉", label: "สถานีรถไฟ" },
  power_plant: { icon: "⚡", label: "โรงไฟฟ้า" },
};
const FACTION = {
  cogwork:   { th: "สมาคมเฟืองจักร", icon: "⚙", color: "#8a6a28" },
  seance:    { th: "คณะทรงญาณ",      icon: "☽", color: "#6a4a7a" },
  ashen:     { th: "กลุ่มเถ้าธุลี",  icon: "✦", color: "#9a3a2a" },
  lamplight: { th: "คณะตะเกียง",     icon: "🕯", color: "#a07028" },
  crown:     { th: "มงกุฎเหล็ก",     icon: "♛", color: "#3a5a72" },
};
const PCOLOR = ["#9a2a1e", "#8a6a28", "#3a5a72", "#6a4a7a", "#3a6a3a"];

const hpos = (c, r) => ({ x: HS * 1.75 * c + (r % 2 ? HS * 0.875 : 0) + HS, y: HS * 1.52 * r + HS });
const hpts = (cx, cy, rr) => Array.from({ length: 6 }, (_, i) => { const a = (Math.PI / 180) * (60 * i - 30); return (cx + rr * Math.cos(a)).toFixed(1) + "," + (cy + rr * Math.sin(a)).toFixed(1); }).join(" ");
const toCube = (c, r) => { const x = c - (r - (r & 1)) / 2; return { x: x, y: -x - r, z: r }; };
const hdist = (a, b) => { const A = toCube(a.col, a.row), B = toCube(b.col, b.row); return Math.max(Math.abs(A.x - B.x), Math.abs(A.y - B.y), Math.abs(A.z - B.z)); };

function evalClue(clue, cell, cells) {
  const p = clue.params || {};
  switch (clue.type) {
    case "within_feat": { const ts = cells.filter(c => c.features.includes(p.feat)); return ts.length > 0 && ts.some(t => hdist(cell, t) <= p.dist); }
    case "within_feat_or": { const ts = cells.filter(c => c.features.some(f => p.feats.includes(f))); return ts.length > 0 && ts.some(t => hdist(cell, t) <= p.dist); }
    case "within_terrain": { if (cell.terrain === p.terrain) return true; const ts = cells.filter(c => c.terrain === p.terrain); return ts.some(t => hdist(cell, t) <= p.dist); }
    case "on_terrain": return cell.terrain === p.terrain;
    case "on_terrain_or": return p.terrains.includes(cell.terrain);
    case "on_rail": return cell.rail;
    case "within_rail": { const ts = cells.filter(c => c.rail); return ts.some(t => hdist(cell, t) <= p.dist); }
    default: return false;
  }
}

const $ = id => document.getElementById(id);
function fail(msg) { $("loading").classList.add("hidden"); $("error").classList.remove("hidden"); $("errMsg").innerHTML = msg; }

let CELLS = null, MYCLUE = null, MARKS = {}, LASTMARK = null, COMP_FIRST = true;

// parse url
const params = new URLSearchParams(location.search);
const mapIdx = parseInt(params.get("map"), 10);
const pIdx = parseInt(params.get("p"), 10);
const mode = params.get("mode") || "open";

if (isNaN(mapIdx) || isNaN(pIdx)) {
  fail(I18N.t("compInvalidLink"));
} else {
  const useMaps = (maps) => {
    const preset = maps.find(m => m.index === mapIdx) || maps[mapIdx];
    if (!preset) return fail(I18N.t("mapNotFound", { n: mapIdx }));
    if (pIdx < 0 || pIdx >= preset.factions.length) return fail(I18N.t("playerNotFound"));
    boot(preset, pIdx);
  };
  fetch("./assets/data/maps.json")
    .then(r => r.json())
    .then(useMaps)
    .catch(() => fail(I18N.t("compLoadFail")));
}

function boot(preset, pi) {
  const faction = preset.factions[pi];
  const fc = FACTION[faction];
  const lang = I18N.getLang();
  MYCLUE = preset.clues.find(c => c.faction === faction);
  CELLS = preset.board.map(c => ({ ...c, id: c.col + "-" + c.row }));

  // crest
  $("crest").style.borderTopColor = fc.color;
  $("crestIcon").textContent = mode === "hidden" ? "📓" : fc.icon;
  $("crestName").textContent = mode === "hidden" ? I18N.t("secretSociety") : I18N.FACTION_I18N[lang][faction].name;
  $("crestName").style.color = mode === "hidden" ? "var(--ink)" : fc.color;
  $("crestPlayer").textContent = I18N.t("playerLabel") + " " + (pi + 1);
  $("crestCode").textContent = MYCLUE.code;
  $("crestCode").style.color = fc.color;
  $("crestCode").style.borderColor = fc.color;

  // intel (derived live from tplKey+params so it re-renders on language switch)
  $("intelText").textContent = I18N.renderClueLabel(MYCLUE, lang);

  // load saved marks/notes (per map+player); use localStorage if available
  const key = "dossier_" + preset.index + "_" + pi;
  try {
    const saved = JSON.parse(localStorage.getItem(key) || "{}");
    MARKS = saved.marks || {};
    if (saved.notes) $("notes").value = saved.notes;
  } catch (e) { MARKS = {}; }

  function persist() {
    try { localStorage.setItem(key, JSON.stringify({ marks: MARKS, notes: $("notes").value })); } catch (e) {}
  }
  $("notes").addEventListener("input", persist);
  $("resetMarks").onclick = () => { MARKS = {}; persist(); renderMap(); $("notesSheet").classList.remove("show"); };

  // bottom sheets
  const openSheet = el => el.classList.add("show");
  const closeSheet = el => el.classList.remove("show");
  $("openNotes").onclick = () => openSheet($("notesSheet"));
  $("closeNotes").onclick = () => closeSheet($("notesSheet"));
  $("openLegend").onclick = () => openSheet($("legendSheet"));
  $("closeLegend").onclick = () => closeSheet($("legendSheet"));
  [$("notesSheet"), $("legendSheet")].forEach(ov => ov.addEventListener("click", e => { if (e.target === ov) closeSheet(ov); }));

  // swipe-down on a sheet to close
  [$("notesSheet"), $("legendSheet")].forEach(ov => {
    const sheet = ov.querySelector(".sheet");
    let startY = null;
    sheet.addEventListener("touchstart", e => { startY = e.touches[0].clientY; }, { passive: true });
    sheet.addEventListener("touchmove", e => {
      if (startY === null) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 0) sheet.style.transform = "translateY(" + Math.min(dy, 300) + "px)";
    }, { passive: true });
    sheet.addEventListener("touchend", e => {
      const dy = (e.changedTouches[0].clientY - startY);
      sheet.style.transform = "";
      if (dy > 90) closeSheet(ov);
      startY = null;
    });
  });

  window.__renderLegend = renderLegend;
  window.__refreshDynamic = () => {
    const lang2 = I18N.getLang();
    $("crestName").textContent = mode === "hidden" ? I18N.t("secretSociety") : I18N.FACTION_I18N[lang2][faction].name;
    $("crestPlayer").textContent = I18N.t("playerLabel") + " " + (pi + 1);
    $("intelText").textContent = I18N.renderClueLabel(MYCLUE, lang2);
    renderLegend();
  };
  renderLegend();

  // precompute possible cells (my clue true)
  CELLS.forEach(c => { c._possible = c.features.length === 0 && evalClue(MYCLUE, c, CELLS); });

  window.__persist = persist;

  renderMap();

  $("loading").classList.add("hidden");
  $("app").classList.remove("hidden");

  // entrance: the notebook "opens" - the crest stamps in like a wax seal, the
  // board + toolbar rise in, then a soft pulse draws the eye to the secret lead.
  if (window.FX) {
    FX.stamp("#crest", { from: 0.9, rotate: -3, duration: 500 });
    FX.entrance(".map-stage, .toolbar", { rise: 16, stagger: 90, delay: 140 });
    setTimeout(function () { FX.pulse("#intelText", { peak: 1.05 }); }, 560);
  }

  // one-time teaching cue: pulse the cells your intel still allows
  setTimeout(highlightPossibleOnce, 700);
}

// briefly outline the still-possible cells so the player learns "bright = possible"
function renderLegend() {
  const lang = I18N.getLang();
  const leg = $("legend");
  leg.innerHTML = "";
  Object.keys(TERRAIN).forEach(k => {
    const v = TERRAIN[k];
    const s = document.createElement("span");
    s.className = "leg";
    s.innerHTML = '<span class="sw" style="background:' + v.fill + '"></span>' + I18N.TERRAIN_NAME[lang][k];
    leg.appendChild(s);
  });
  ["\uD83D\uDE84 " + I18N.t("railLabel")].concat(
    Object.keys(FEATURE).map(k => FEATURE[k].icon + " " + I18N.FEATURE_NAME[lang][k])
  ).forEach(t => {
    const s = document.createElement("span"); s.className = "leg"; s.textContent = t; leg.appendChild(s);
  });
}

function highlightPossibleOnce() {
  if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const svg = $("mapWrap").querySelector("svg");
  if (!svg) return;
  const ns = "http://www.w3.org/2000/svg";
  CELLS.filter(c => c._possible).forEach(cell => {
    const pos = hpos(cell.col, cell.row);
    const pts = hpts(pos.x, pos.y, HS - 1.2);
    const p = document.createElementNS(ns, "polygon");
    p.setAttribute("points", pts);
    p.setAttribute("fill", "none");
    p.setAttribute("stroke", "#e9c46a");
    p.setAttribute("stroke-width", "2");
    p.setAttribute("style", "pointer-events:none;animation:possibleHint 1.6s ease both");
    svg.appendChild(p);
    setTimeout(() => p.remove(), 1700);
  });
}

// cycle mark: none → check → cross → question → none
function cycleMark(id) {
  const cur = MARKS[id] || "";
  const next = cur === "" ? "check" : cur === "check" ? "cross" : cur === "cross" ? "q" : "";
  if (next === "") delete MARKS[id]; else MARKS[id] = next;
  LASTMARK = id;
  if (navigator.vibrate) { try { navigator.vibrate(9); } catch (e) {} }
  if (window.__persist) window.__persist();
  renderMap();
}

function renderMap() {
  const svgW = HS * 1.75 * COLS + HS * 2, svgH = HS * 1.52 * ROWS + HS * 2;
  let s = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" xmlns="http://www.w3.org/2000/svg">';

  // rail: build first, draw after hexes; dim rail on ruled-out cells
  let railSvg = "";
  const rail = CELLS.filter(c => c.rail);
  for (const a of rail) for (const b of rail) {
    if (a.id < b.id && hdist(a, b) === 1) {
      const pa = hpos(a.col, a.row), pb = hpos(b.col, b.row);
      const dim = (!a._possible && !b._possible);
      const o = dim ? 0.22 : 1;
      railSvg += '<line x1="' + pa.x + '" y1="' + pa.y + '" x2="' + pb.x + '" y2="' + pb.y + '" stroke="#3a2c1a" stroke-width="2.4" stroke-linecap="round" opacity="' + (0.75 * o) + '"/>';
      railSvg += '<line x1="' + pa.x + '" y1="' + pa.y + '" x2="' + pb.x + '" y2="' + pb.y + '" stroke="#c4b596" stroke-width="0.7" stroke-dasharray="2 3" stroke-linecap="round" opacity="' + o + '"/>';
    }
  }

  const cascade = COMP_FIRST;
  for (const cell of CELLS) {
    const pos = hpos(cell.col, cell.row);
    const pts = hpts(pos.x, pos.y, HS - 1.2);
    const t = TERRAIN[cell.terrain];
    const faded = !cell._possible;       // auto-fade impossible-by-my-clue
    const op = faded ? 0.18 : 1;
    let st = 'cursor:pointer';
    if (cascade) { const d = ((cell.col + cell.row) * 0.022).toFixed(3); st += ';transform-box:fill-box;transform-origin:center;animation:tileDrop 0.4s var(--ease-spring) both;animation-delay:' + d + 's'; }
    s += '<polygon points="' + pts + '" fill="' + t.fill + '" stroke="#5a4632" stroke-width="0.6" opacity="' + op + '" data-id="' + cell.id + '" class="cell" style="' + st + '"/>';
  }
  if (cascade) COMP_FIRST = false;

  // วาดรางทับบน hex
  s += railSvg;

  // features (dim if faded)
  for (const cell of CELLS) {
    const pos = hpos(cell.col, cell.row);
    const faded = !cell._possible;
    for (const f of cell.features) {
      s += '<text x="' + pos.x + '" y="' + (pos.y + 1) + '" text-anchor="middle" dominant-baseline="middle" font-size="11" opacity="' + (faded ? 0.25 : 1) + '" style="pointer-events:none">' + FEATURE[f].icon + '</text>';
    }
  }

  // user marks
  for (const cell of CELLS) {
    const m = MARKS[cell.id];
    if (!m) continue;
    const pos = hpos(cell.col, cell.row);
    const fresh = cell.id === LASTMARK;
    const kf = m === "check" ? "markDrop" : m === "cross" ? "markCross" : "markQ";
    const anim = fresh ? ' style="transform-box:fill-box;transform-origin:center;animation:' + kf + ' 0.42s var(--ease-spring) both;pointer-events:none"' : ' style="pointer-events:none"';
    if (m === "check") {
      s += '<text x="' + pos.x + '" y="' + (pos.y + 1.5) + '" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#3a6a3a" font-weight="bold"' + anim + '>✓</text>';
    } else if (m === "cross") {
      s += '<text x="' + pos.x + '" y="' + (pos.y + 1.5) + '" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#9a2a1e" font-weight="bold"' + anim + '>✗</text>';
    } else if (m === "q") {
      s += '<text x="' + pos.x + '" y="' + (pos.y + 1.5) + '" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#6a4a7a" font-weight="bold"' + anim + '>?</text>';
    }
  }

  s += "</svg>";
  $("mapWrap").innerHTML = s;
  $("mapWrap").querySelectorAll(".cell").forEach(el => {
    el.addEventListener("click", () => cycleMark(el.dataset.id));
  });
}

// ── language toggle (EN default, TH available) ───────────
function applyStaticI18N() {
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = I18N.t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => { el.placeholder = I18N.t(el.dataset.i18nPh); });
  document.documentElement.lang = I18N.getLang();
  $("langToggle").textContent = I18N.getLang() === "en" ? "TH" : "EN";
}
$("langToggle").onclick = () => {
  I18N.setLang(I18N.getLang() === "en" ? "th" : "en");
  applyStaticI18N();
  if (window.__refreshDynamic) window.__refreshDynamic();
};
applyStaticI18N();

})();
</script>
